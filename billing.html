<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jini POS & Billing</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#064e3b">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        html { scroll-behavior: smooth; }
        .focus-ring:focus-within { box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.4); border-color: #D4AF37; }
        .toggle-checkbox:checked { right: 0; border-color: #D4AF37; }
        .toggle-checkbox:checked + .toggle-label { background-color: #D4AF37; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-gradient-to-br from-[#064e3b] via-[#022c22] to-gray-900 font-sans text-gray-800 h-[100dvh] flex flex-col overflow-hidden selection:bg-[#D4AF37] selection:text-gray-900">

    <script>
        if (sessionStorage.getItem('jini_auth') !== 'true') { window.location.replace('index.html'); }
    </script>

    <div class="flex-shrink-0 flex flex-col z-10 sticky top-0 bg-[#064e3b]/95 backdrop-blur-md shadow-md border-b border-white/10">
        <div class="flex items-center px-4 py-3 max-w-5xl mx-auto w-full">
            <a href="index.html" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center border border-white/20 active:scale-90 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
            </a>
            <h1 class="flex-1 text-center text-lg md:text-2xl font-black text-white tracking-widest uppercase mr-10">POS & Billing</h1>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto px-4 lg:px-8 py-4 pb-40 max-w-6xl mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-7 space-y-5">
            
            <div class="bg-white/95 backdrop-blur-lg rounded-[1.5rem] p-5 shadow-xl border border-white/20">
                <h3 class="text-lg font-black text-[#064e3b] mb-4 uppercase tracking-wide">Customer Details</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 sm:col-span-1">
                        <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Customer Name *</label>
                        <input type="text" id="custName" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-bold text-gray-800 outline-none focus:border-[#047857] transition-all" placeholder="Enter full name" />
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Mobile Number *</label>
                        <input type="number" id="custMobile" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-bold text-gray-800 outline-none focus:border-[#047857] transition-all" placeholder="10-digit phone" />
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Memo Date</label>
                        <input type="date" id="memoDate" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2 px-3 font-bold text-gray-800 outline-none" />
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Estimate No.</label>
                        <input type="text" id="memoId" class="w-full bg-gray-100 border border-gray-200 rounded-xl py-2 px-3 font-black text-gray-800 text-center outline-none" readonly />
                    </div>
                </div>
            </div>

            <div class="bg-white/95 backdrop-blur-lg rounded-[1.5rem] p-5 shadow-xl border border-white/20">
                <h3 class="text-lg font-black text-[#064e3b] mb-4 uppercase tracking-wide">Add Item to Memo</h3>
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Item Description *</label>
                        <input type="text" id="itemDesc" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-bold text-gray-800 outline-none focus:border-[#047857]" placeholder="e.g. Silver Bridal Payal" />
                    </div>
                    
                    <div>
                        <label class="block text-xs font-black text-[#047857] mb-1 uppercase">Metal Rate (₹/g)</label>
                        <input type="number" id="itemRate" class="w-full bg-emerald-50/50 border border-emerald-200 rounded-xl py-2.5 px-3 font-black text-gray-900 text-lg outline-none focus:border-[#047857]" placeholder="0" />
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Labour Charge (₹/g)</label>
                        <input type="number" id="itemLabour" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-bold text-gray-900 text-lg outline-none focus:border-[#047857]" placeholder="0" />
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Net Weight (g) *</label>
                        <input type="number" id="itemWeight" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-black text-gray-900 text-lg outline-none focus:border-[#047857] text-center" placeholder="0.00" />
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Other Charges (₹)</label>
                        <input type="number" id="itemOther" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-bold text-gray-900 text-lg outline-none focus:border-[#047857] text-center" placeholder="0" />
                    </div>
                </div>

                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-200 mb-4">
                    <div class="flex items-center gap-3">
                        <div class="relative inline-block w-10 h-5 align-middle select-none">
                            <input type="checkbox" id="itemHuid" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-2 border-gray-300 appearance-none cursor-pointer z-10 transition-all" checked />
                            <label for="itemHuid" class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer transition-colors"></label>
                        </div>
                        <span class="text-xs font-extrabold text-gray-600 uppercase">Apply HUID (+₹50)</span>
                    </div>
                </div>

                <button onclick="addItem()" class="w-full bg-[#047857] hover:bg-[#064e3b] text-white font-black py-3 px-4 rounded-xl uppercase tracking-widest transition-colors shadow-md active:scale-[0.99]">
                    ➕ Add Item to Receipt
                </button>
            </div>
            
        </div>

        <div class="lg:col-span-5">
            <div class="bg-white rounded-[2rem] shadow-2xl p-6 border border-gray-200 flex flex-col sticky top-24 min-h-[500px]">
                <div class="text-center border-b-2 border-dashed border-gray-200 pb-4 mb-4">
                    <h2 class="text-2xl font-black text-[#064e3b] tracking-tight">JINI JEWELS</h2>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Estimate / Cash Memo</p>
                </div>

                <div class="text-xs font-bold text-gray-600 space-y-1 mb-4">
                    <div class="flex justify-between"><span>Estimate No:</span><span class="text-gray-900" id="prevMemoId">--</span></div>
                    <div class="flex justify-between"><span>Date:</span><span class="text-gray-900" id="prevDate">--</span></div>
                    <div class="flex justify-between"><span>Customer:</span><span class="text-gray-900" id="prevName">--</span></div>
                    <div class="flex justify-between"><span>Mobile:</span><span class="text-gray-900" id="prevMobile">--</span></div>
                </div>

                <div class="flex-1 overflow-y-auto max-h-[220px] border-t border-b border-gray-100 py-3 my-2 space-y-3" id="invoiceItemsList">
                    <p class="text-center text-gray-300 font-medium text-sm py-8" id="emptyCartMsg">No items added to invoice yet</p>
                </div>

                <div class="mt-4 pt-3 border-t border-dashed border-gray-200 space-y-2 text-xs font-bold text-gray-500">
                    <div class="flex justify-between"><span>Gross Subtotal</span><span class="text-gray-900">₹ <span id="prevGross">0</span></span></div>
                    
                    <div class="flex justify-between items-center text-emerald-800">
                        <div class="flex items-center gap-2">
                            <div class="relative inline-block w-8 h-4 align-middle select-none">
                                <input type="checkbox" id="taxToggle" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-2 border-gray-300 appearance-none cursor-pointer z-10 transition-all" />
                                <label for="taxToggle" class="toggle-label block overflow-hidden h-4 rounded-full bg-gray-300 cursor-pointer transition-colors"></label>
                            </div>
                            <span>Add GST (3%)</span>
                        </div>
                        <span>₹ <span id="prevTax">0</span></span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 w-full bg-gray-900 rounded-t-[2rem] shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t-[3px] border-[#D4AF37] px-6 py-5 z-20 transition-transform">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div>
                <span class="text-gray-400 text-xs font-bold uppercase tracking-widest block">Running Total</span>
                <span class="text-xs font-bold text-emerald-400" id="itemCountLabel">0 Items Added</span>
            </div>
            <div class="flex items-center text-emerald-500 font-black text-3xl md:text-5xl">
                <span class="mr-2">₹</span>
                <span id="invoiceGrandTotal" class="text-white font-black">0</span>
            </div>
        </div>
    </div>

    <script>
        // Set Default Date & Automated Invoice ID
        document.getElementById('memoDate').valueAsDate = new Date();
        const randId = 'JJ-' + Math.floor(100000 + Math.random() * 900000);
        document.getElementById('memoId').value = randId;
        document.getElementById('prevMemoId').innerText = randId;

        // Memo Arrays
        let items = [];

        // UI Live Synced Elements
        const setupSync = (inputId, prevId, fallback) => {
            const input = document.getElementById(inputId);
            const prev = document.getElementById(prevId);
            input.addEventListener('input', () => {
                prev.innerText = input.value || fallback;
            });
            prev.innerText = input.value || fallback;
        };
        setupSync('custName', 'prevName', '--');
        setupSync('custMobile', 'prevMobile', '--');
        setupSync('memoDate', 'prevDate', '--');

        // Form Inputs
        const form = {
            desc: document.getElementById('itemDesc'),
            rate: document.getElementById('itemRate'),
            labour: document.getElementById('itemLabour'),
            weight: document.getElementById('itemWeight'),
            other: document.getElementById('itemOther'),
            huid: document.getElementById('itemHuid'),
            taxToggle: document.getElementById('taxToggle')
        };

        function addItem() {
            const desc = form.desc.value.trim();
            const rate = parseFloat(form.rate.value) || 0;
            const labour = parseFloat(form.labour.value) || 0;
            const weight = parseFloat(form.weight.value) || 0;
            const other = parseFloat(form.other.value) || 0;
            const huidAmt = form.huid.checked ? 50 : 0;

            if (!desc || weight <= 0) {
                alert("Please fill in mandatory Item Description and Net Weight!");
                return;
            }

            // Math execution
            const baseValue = (rate + labour) * weight;
            const itemTotal = Math.round(baseValue + huidAmt + other);

            // Push to invoice inventory
            items.push({ desc, rate, labour, weight, other, huidAmt, total: itemTotal });

            // Clear item entry form
            form.desc.value = '';
            form.weight.value = '';
            form.other.value = '';

            renderInvoice();
        }

        function deleteItem(index) {
            items.splice(index, 1);
            renderInvoice();
        }

        function renderInvoice() {
            const container = document.getElementById('invoiceItemsList');
            const emptyMsg = document.getElementById('emptyCartMsg');
            
            if (items.length === 0) {
                container.innerHTML = '';
                container.appendChild(emptyMsg);
                document.getElementById('itemCountLabel').innerText = '0 Items Added';
                document.getElementById('prevGross').innerText = '0';
                document.getElementById('prevTax').innerText = '0';
                document.getElementById('invoiceGrandTotal').innerText = '0';
                return;
            }

            if (emptyMsg) emptyMsg.remove();
            container.innerHTML = '';

            let grossSubtotal = 0;

            items.forEach((item, index) => {
                grossSubtotal += item.total;

                const row = document.createElement('div');
                row.className = "flex justify-between items-start bg-gray-50/60 p-2.5 rounded-xl border border-gray-100 group relative";
                row.innerHTML = `
                    <div class="flex-1 pr-4">
                        <p class="font-black text-gray-800 text-sm">${item.desc}</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase mt-0.5">${item.weight}g @ ₹${item.rate + item.labour}/g ${item.huidAmt ? '+ HUID' : ''}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="font-black text-gray-900 text-sm">₹${item.total.toLocaleString('en-IN')}</span>
                        <button onclick="deleteItem(${index})" class="text-red-400 hover:text-red-600 active:scale-90 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                `;
                container.appendChild(row);
            });

            // Tax and Final Totals calculations
            const taxApplied = form.taxToggle.checked;
            const gstAmount = taxApplied ? Math.round(grossSubtotal * 0.03) : 0;
            const finalGrandTotal = grossSubtotal + gstAmount;

            // UI updates
            document.getElementById('itemCountLabel').innerText = `${items.length} Item${items.length > 1 ? 's' : ''} Added`;
            document.getElementById('prevGross').innerText = grossSubtotal.toLocaleString('en-IN');
            document.getElementById('prevTax').innerText = gstAmount.toLocaleString('en-IN');
            document.getElementById('invoiceGrandTotal').innerText = finalGrandTotal.toLocaleString('en-IN');
        }

        form.taxToggle.addEventListener('change', renderInvoice);
    </script>
</body>
</html>
