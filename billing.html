<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jini POS & Billing</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#064e3b">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        html { scroll-behavior: smooth; }
        .focus-ring:focus-within { box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.4); border-color: #D4AF37; }
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* ADVANCED FULL-PAGE LUXURY PRINT ENGINE */
        @media print {
            .no-print, .internal-only, button, input { 
                display: none !important; 
            }
            body, html { 
                background: #ffffff !important; 
                color: #000000 !important; 
                overflow: visible !important; 
                height: auto !important;
                padding: 0 !important;
                margin: 0 !important;
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact;
            }
            div, main, .grid {
                display: block !important;
                overflow: visible !important;
                box-shadow: none !important;
                background: transparent !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            #printableMemoCard { 
                display: block !important; 
                width: 100% !important; 
                max-width: 100% !important; 
                border: none !important;
                padding: 40px !important; 
                margin: 0 auto !important;
                background: #ffffff !important;
                box-shadow: none !important;
            }
            .print-table {
                width: 100% !important;
                border-collapse: collapse !important;
                margin-top: 25px !important;
                margin-bottom: 25px !important;
            }
            .print-table th {
                background-color: #f9fafb !important;
                color: #000000 !important;
                border-top: 2px solid #000000 !important;
                border-bottom: 2px solid #000000 !important;
                padding: 12px 10px !important;
                font-weight: 900 !important;
                text-transform: uppercase !important;
                font-size: 12px !important;
                letter-spacing: 0.05em !important;
            }
            .print-table td {
                border-bottom: 1px solid #e5e7eb !important;
                padding: 14px 10px !important;
                font-size: 13px !important;
                color: #000000 !important;
            }
            .text-gray-600, .text-gray-500, .text-gray-400 { color: #374151 !important; }
            .text-gray-900, .text-[#064e3b] { color: #000000 !important; }
            .print-border-dashed { border-bottom: 2px dashed #000000 !important; }
            
            .print-footer-flex {
                display: flex !important;
                flex-direction: row !important;
                justify-content: space-between !important;
                align-items: flex-end !important;
                width: 100% !important;
                margin-top: 40px !important;
            }
            .hide-on-print { display: none !important; }
            
            /* Enforces lowercase print for internal cypher track letters */
            .print-cypher-lowercase {
                display: block !important;
                text-transform: lowercase !important;
                font-size: 10px !important;
                color: #555555 !important;
                font-family: monospace !important;
                margin-top: 2px !important;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#064e3b] via-[#022c22] to-gray-900 font-sans text-gray-800 h-[100dvh] flex flex-col overflow-hidden selection:bg-[#D4AF37] selection:text-gray-900">

    <script>
        if (sessionStorage.getItem('jini_auth') !== 'true') { window.location.replace('index.html'); }
    </script>

    <div class="flex-shrink-0 flex flex-col z-10 sticky top-0 bg-[#064e3b]/95 backdrop-blur-md shadow-md border-b border-white/10 no-print">
        <div class="flex items-center px-4 py-3 max-w-6xl mx-auto w-full">
            <a href="index.html" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center border border-white/20 active:scale-90 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
            </a>
            <h1 class="flex-1 text-center text-lg md:text-2xl font-black text-white tracking-widest uppercase mr-10">POS & Billing</h1>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto px-4 lg:px-8 py-4 pb-40 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-7 space-y-5 no-print">
            
            <div id="customerCard" class="bg-white/95 backdrop-blur-lg rounded-[1.5rem] p-5 shadow-xl border border-white/20">
                <h3 class="text-lg font-black text-[#064e3b] mb-4 uppercase tracking-wide">Customer Details</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 sm:col-span-1">
                        <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Customer Name *</label>
                        <input type="text" id="custName" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-bold text-gray-800 outline-none focus:border-[#047857]" placeholder="Required fields" />
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Mobile Number *</label>
                        <input type="number" id="custMobile" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-bold text-gray-800 outline-none focus:border-[#047857]" placeholder="Required fields" />
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Memo Date</label>
                        <input type="date" id="memoDate" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2 px-3 font-bold text-gray-800 outline-none" />
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Estimate No. (Changeable)</label>
                        <input type="text" id="memoId" class="w-full bg-gray-50 border-2 border-[#D4AF37] rounded-xl py-2 px-3 font-black text-gray-900 text-center outline-none focus:bg-white" placeholder="e.g. 1001" />
                    </div>
                </div>
            </div>

            <div class="bg-white/95 backdrop-blur-lg rounded-[1.5rem] p-5 shadow-xl border border-white/20">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mb-4">
                    <h3 class="text-lg font-black text-[#064e3b] uppercase tracking-wide">Add/Modify Item</h3>
                    <div class="flex bg-gray-100 p-1 rounded-xl border border-gray-200 w-full sm:w-auto">
                        <button type="button" onclick="setSaleMode(event, 'weight')" id="btnModeWeight" class="flex-1 sm:flex-none text-xs font-black uppercase px-4 py-2 rounded-lg bg-[#047857] text-white transition-all shadow-sm">By Weight</button>
                        <button type="button" onclick="setSaleMode(event, 'mrp')" id="btnModeMrp" class="flex-1 sm:flex-none text-xs font-black uppercase px-4 py-2 rounded-lg text-gray-500 transition-all">Fixed MRP</button>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Item Description *</label>
                        <input type="text" id="itemDesc" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-bold text-gray-800 outline-none focus:border-[#047857]" placeholder="e.g. Silver Payal Set" />
                    </div>

                    <div class="col-span-2 bg-stone-50 border border-stone-200 rounded-xl p-3">
                        <label class="block text-[10px] font-black text-stone-500 uppercase tracking-widest mb-1">Cypher Tag Code (Prints in Small Case below name)</label>
                        <input type="text" id="itemCypher" class="w-full bg-white border border-stone-300 rounded-lg py-1.5 px-3 text-sm font-black tracking-widest uppercase outline-none focus:border-[#047857]" placeholder="e.g. frarxlar" />
                    </div>
                    
                    <div id="rowWeightRate" class="col-span-2 grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-black text-[#047857] mb-1 uppercase">Metal Rate (₹/g)</label>
                            <input type="number" id="itemRate" class="w-full bg-emerald-50/50 border border-emerald-200 rounded-xl py-2.5 px-3 font-black text-gray-900 text-lg outline-none focus:border-[#047857]" placeholder="0" />
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Labour Charge (₹/g)</label>
                            <input type="number" id="itemLabour" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-bold text-gray-900 text-lg outline-none focus:border-[#047857]" placeholder="0" />
                        </div>
                    </div>

                    <div id="rowFixedMrp" class="col-span-2 hidden">
                        <label class="block text-xs font-black text-blue-800 mb-1 uppercase">Fixed Item MRP (₹)</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-blue-700 text-lg font-bold">₹</span>
                            <input type="number" id="itemMrp" class="w-full bg-blue-50/30 border border-blue-200 rounded-xl py-2.5 pl-8 pr-3 font-black text-gray-900 text-lg outline-none focus:border-blue-700" placeholder="0" />
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1 uppercase" id="lblWeight">Net Weight (g) *</label>
                        <input type="number" id="itemWeight" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-black text-gray-900 text-lg outline-none focus:border-[#047857] text-center" placeholder="0.00" />
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1 uppercase">Other Charges (₹)</label>
                        <input type="number" id="itemOther" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-black text-gray-900 text-lg outline-none focus:border-[#047857] text-center" placeholder="0" />
                    </div>

                    <div class="col-span-2">
                        <label class="block text-xs font-bold text-[#047857] mb-1 uppercase">HUID / Cert Charges (₹)</label>
                        <input type="number" id="itemHuidPrice" class="w-full bg-emerald-50/20 border border-emerald-200 rounded-xl py-2.5 px-3 font-bold text-gray-900 text-lg outline-none focus:border-[#047857]" value="50" />
                    </div>
                </div>

                <button type="button" onclick="addItem(event)" class="w-full bg-[#047857] hover:bg-[#064e3b] text-white font-black py-3.5 px-4 rounded-xl uppercase tracking-widest transition-colors shadow-md active:scale-[0.99]">
                    ➕ Add Item to Receipt
                </button>
            </div>
        </div>

        <div class="lg:col-span-5 space-y-4">
            <div id="printableMemoCard" class="bg-white rounded-[2rem] shadow-2xl p-5 md:p-6 border border-gray-200 flex flex-col min-h-[550px]">
                
                <div class="text-center print-border-dashed border-b-2 border-dashed border-gray-200 pb-3 mb-4">
                    <h2 class="text-2xl font-black text-[#064e3b] tracking-tight">JINI JEWELS</h2>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Estimate / Cash Memo</p>
                </div>

                <div class="text-xs font-bold text-gray-600 space-y-1.5 mb-4 px-1">
                    <div class="flex justify-between"><span>Estimate No:</span><span class="text-gray-900 font-black" id="prevMemoId">--</span></div>
                    <div class="flex justify-between"><span>Date:</span><span class="text-gray-900" id="prevDate">--</span></div>
                    <div class="flex justify-between"><span>Customer:</span><span class="text-gray-900" id="prevName">--</span></div>
                    <div class="flex justify-between"><span>Mobile:</span><span class="text-gray-900" id="prevMobile">--</span></div>
                </div>

                <div class="flex-1 overflow-y-auto max-h-[320px] my-2" id="invoiceTableWrapper">
                    <p class="text-center text-gray-300 font-medium text-sm py-16" id="emptyCartMsg">No items added to invoice yet</p>
                </div>

                <div class="mt-4 pt-3 border-t border-dashed border-gray-200 space-y-2 text-sm font-bold text-gray-700 px-1">
                    <div class="flex justify-between" id="invoiceGrossRow">
                        <span class="text-gray-500">Gross Subtotal</span>
                        <span class="text-gray-900">₹ <span id="prevGross">0</span></span>
                    </div>
                    
                    <div class="flex justify-between text-emerald-800" id="invoiceGstRow">
                        <span>GST (3%)</span>
                        <span>₹ <span id="prevTax">0</span></span>
                    </div>

                    <div class="flex justify-between items-center text-emerald-800 internal-only no-print bg-emerald-50/30 p-2 rounded-xl border border-emerald-100 mt-1">
                        <div class="flex items-center gap-2">
                            <div class="relative inline-block w-8 h-4 align-middle select-none">
                                <input type="checkbox" id="taxToggle" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-2 border-gray-300 appearance-none cursor-pointer z-10 transition-all" />
                                <label for="taxToggle" class="toggle-label block overflow-hidden h-4 rounded-full bg-gray-300 cursor-pointer transition-colors"></label>
                            </div>
                            <span class="text-xs font-black uppercase">Apply GST (3%)</span>
                        </div>
                    </div>

                    <div class="flex justify-between items-center pt-2.5 border-t-2 border-gray-900 font-black text-base md:text-xl text-gray-900 mt-2">
                        <span>Net Payable</span>
                        <span>₹ <span id="printGrandTotal">0</span></span>
                    </div>
                </div>

                <div class="print-footer-flex flex justify-between items-end mt-8 pt-4 border-t border-gray-100 text-left w-full">
                    <div><p class="text-gray-900 font-black tracking-widest text-xs">E. & O.E.</p></div>
                    <div class="text-right border-t border-gray-300 pt-6 w-32 text-center uppercase text-[10px] font-black text-gray-600">Authorized Sign</div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 internal-only">
                <button type="button" onclick="executePrint(event)" class="bg-gray-900 hover:bg-black text-[#D4AF37] font-bold py-3.5 px-4 rounded-xl uppercase tracking-wider text-xs shadow-md flex items-center justify-center gap-2">Print / Save PDF</button>
                <button type="button" onclick="executeShare(event)" class="bg-amber-600 hover:bg-amber-700 text-white font-bold py-3.5 px-4 rounded-xl uppercase tracking-wider text-xs shadow-md flex items-center justify-center gap-2">Share via Text</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-gray-900 rounded-t-[2rem] shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t-[3px] border-[#D4AF37] px-6 py-5 z-20 transition-transform internal-only">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div>
                <span class="text-gray-400 text-xs font-bold uppercase tracking-widest block">Running Total</span>
                <span class="text-xs font-bold text-emerald-400" id="itemCountLabel">0 Items Added</span>
            </div>
            <div class="flex items-center text-emerald-500 font-black text-3xl md:text-5xl">
                <span class="mr-2">₹</span>
                <span id="invoiceGrandTotal" class="text-white font-black">0</span>
            </div>
        </div>
    </div>

    <script>
        // Init automated default baseline number package setup
        document.getElementById('memoDate').valueAsDate = new Date();
        const initialId = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('memoId').value = initialId;
        document.getElementById('prevMemoId').innerText = initialId;

        let items = [];
        let saleMode = "weight";

        // Real-time sequential input listener synchronization hook logic loop block
        const memoIdInput = document.getElementById('memoId');
        memoIdInput.addEventListener('input', () => {
            document.getElementById('prevMemoId').innerText = memoIdInput.value || '--';
        });

        const setupSync = (inputId, prevId, fallback) => {
            const input = document.getElementById(inputId);
            const prev = document.getElementById(prevId);
            input.addEventListener('input', () => { prev.innerText = input.value || fallback; });
            prev.innerText = input.value || fallback;
        };
        setupSync('custName', 'prevName', '--');
        setupSync('custMobile', 'prevMobile', '--');
        setupSync('memoDate', 'prevDate', '--');

        const inputs = {
            name: document.getElementById('custName'),
            mobile: document.getElementById('custMobile'),
            memoId: document.getElementById('memoId'),
            desc: document.getElementById('itemDesc'),
            cypher: document.getElementById('itemCypher'),
            rate: document.getElementById('itemRate'),
            labour: document.getElementById('itemLabour'),
            mrp: document.getElementById('itemMrp'),
            weight: document.getElementById('weight'), // Sync id fix compatibility checks
            itemWeight: document.getElementById('itemWeight'),
            other: document.getElementById('itemOther'),
            huidPrice: document.getElementById('itemHuidPrice'),
            taxToggle: document.getElementById('taxToggle')
        };

        // EXPLICIT MANDATORY SHIELD VALIDATION CHECKER FUNCTION
        function checkMandatoryDetails() {
            const nameVal = inputs.name.value.trim();
            const mobileVal = inputs.mobile.value.trim();
            
            if (!nameVal || !mobileVal) {
                alert("ALERT: Customer Name and Mobile Number are strictly compulsory!");
                
                if(!nameVal) inputs.name.className = "w-full bg-red-50 border-2 border-red-500 rounded-xl py-2.5 px-3 font-bold text-gray-800 outline-none";
                if(!mobileVal) inputs.mobile.className = "w-full bg-red-50 border-2 border-red-500 rounded-xl py-2.5 px-3 font-bold text-gray-800 outline-none";
                
                document.getElementById('customerCard').scrollIntoView({ behavior: 'smooth' });
                return false;
            }
            
            inputs.name.className = "w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-bold text-gray-800 outline-none focus:border-[#047857]";
            inputs.mobile.className = "w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-bold text-gray-800 outline-none focus:border-[#047857]";
            return true;
        }

        function setSaleMode(e, mode) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            saleMode = mode;
            const btnW = document.getElementById('btnModeWeight');
            const btnM = document.getElementById('btnModeMrp');
            const rowW = document.getElementById('rowWeightRate');
            const rowM = document.getElementById('rowFixedMrp');
            const lblWeight = document.getElementById('lblWeight');

            if (mode === 'weight') {
                btnW.className = "flex-1 sm:flex-none text-xs font-black uppercase px-4 py-2 rounded-lg bg-[#047857] text-white transition-all shadow-sm";
                btnM.className = "flex-1 sm:flex-none text-xs font-black uppercase px-4 py-2 rounded-lg text-gray-500 transition-all";
                rowW.classList.remove('hidden');
                rowM.classList.add('hidden');
                lblWeight.innerText = "Net Weight (g) *";
            } else {
                btnM.className = "flex-1 sm:flex-none text-xs font-black uppercase px-4 py-2 rounded-lg bg-blue-800 text-white transition-all shadow-sm";
                btnW.className = "flex-1 sm:flex-none text-xs font-black uppercase px-4 py-2 rounded-lg text-gray-500 transition-all";
                rowM.classList.remove('hidden');
                rowW.classList.add('hidden');
                lblWeight.innerText = "Weight (g - Optional)";
            }
        }

        function addItem(e) {
            if (e) e.preventDefault();

            // 1. BLOCKS ADDITION IF MANDATORY FIELD MISSING
            if (!checkMandatoryDetails()) return;

            const desc = inputs.desc.value.trim();
            const cypherStr = inputs.cypher.value.trim();
            const other = parseFloat(inputs.other.value) || 0;
            const weight = parseFloat(inputs.itemWeight.value) || 0;
            const huidAmt = parseFloat(inputs.huidPrice.value) || 0;

            if (!desc) { alert("Please input Item Description!"); return; }

            let calculatedItemTotal = 0;
            let savedRate = 0;
            let savedLabour = 0;
            let savedMrp = 0;

            if (saleMode === "weight") {
                savedRate = parseFloat(inputs.rate.value) || 0;
                savedLabour = parseFloat(inputs.labour.value) || 0;
                if (weight <= 0) { alert("Net Weight is mandatory for calculations by weight!"); return; }
                calculatedItemTotal = Math.round(((savedRate + savedLabour) * weight) + other + huidAmt);
            } else {
                savedMrp = parseFloat(inputs.mrp.value) || 0;
                if (savedMrp <= 0) { alert("Please input Fixed Item MRP value!"); return; }
                calculatedItemTotal = Math.round(savedMrp + other + huidAmt);
            }

            items.push({ 
                desc, cypher: cypherStr, total: calculatedItemTotal,
                rate: savedRate, labour: savedLabour, mrp: savedMrp,
                weight, other, huidPriceVal: huidAmt
            });

            inputs.desc.value = ''; inputs.cypher.value = ''; inputs.itemWeight.value = ''; inputs.other.value = ''; inputs.mrp.value = ''; inputs.huidPrice.value = '50';
            renderInvoice();
        }

        function editItem(index) {
            const item = items[index];
            inputs.desc.value = item.desc;
            inputs.cypher.value = item.cypher || '';
            inputs.other.value = item.other || '';
            inputs.itemWeight.value = item.weight || '';
            inputs.huidPrice.value = item.huidPriceVal;

            if (item.mrp > 0) {
                setSaleMode(null, 'mrp');
                inputs.mrp.value = item.mrp;
            } else {
                setSaleMode(null, 'weight');
                inputs.rate.value = item.rate;
                inputs.labour.value = item.labour;
            }

            items.splice(index, 1);
            renderInvoice();
            inputs.desc.focus();
        }

        function deleteItem(index) {
            items.splice(index, 1);
            renderInvoice();
        }

        function renderInvoice() {
            const wrapper = document.getElementById('invoiceTableWrapper');
            
            if (items.length === 0) {
                wrapper.innerHTML = `<p class="text-center text-gray-300 font-medium text-sm py-16" id="emptyCartMsg">No items added to invoice yet</p>`;
                document.getElementById('itemCountLabel').innerText = '0 Items Added';
                document.getElementById('prevGross').innerText = '0'; document.getElementById('prevTax').innerText = '0';
                document.getElementById('invoiceGrandTotal').innerText = '0'; document.getElementById('printGrandTotal').innerText = '0';
                return;
            }

            let tableHtml = `
                <table class="print-table w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b-2 border-black">
                            <th class="py-2 text-xs font-black text-gray-800 uppercase tracking-wider w-8 text-center">Sr.</th>
                            <th class="py-2 text-xs font-black text-gray-800 uppercase tracking-wider">Description</th>
                            <th class="py-2 text-xs font-black text-gray-800 uppercase tracking-wider text-right w-20">Weight</th>
                            <th class="py-2 text-xs font-black text-gray-800 uppercase tracking-wider text-right w-24">Rate/g</th>
                            <th class="py-2 text-xs font-black text-gray-800 uppercase tracking-wider text-right pr-1 w-28">Amount</th>
                            <th class="py-2 text-xs font-black text-gray-800 uppercase tracking-wider text-center w-16 internal-only no-print">Action</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
            `;

            let grossSubtotal = 0;

            items.forEach((item, index) => {
                grossSubtotal += item.total;
                
                const weightDisplay = item.weight > 0 ? `${item.weight.toFixed(2)} g` : `-`;
                const rateDisplay = item.mrp > 0 ? `-` : `₹${item.rate + item.labour}`;
                const hasAddons = item.huidPriceVal > 0 || item.other > 0;

                tableHtml += `
                    <tr class="align-top">
                        <td class="py-3 text-xs font-bold text-gray-400 text-center">${index + 1}</td>
                        <td class="py-3">
                            <div class="flex flex-col">
                                <span class="font-black text-gray-800 text-sm tracking-tight">${item.desc}</span>
                                ${item.cypher ? `<span class="print-cypher-lowercase block text-[10px] font-mono text-gray-400 lowercase">${item.cypher.toLowerCase()}</span>` : ''}
                            </div>
                            ${hasAddons ? `<span class="text-[10px] text-gray-400 block font-bold uppercase tracking-wide mt-0.5">(Inc. ${item.huidPriceVal > 0 ? 'HUID/Cert' : ''}${item.huidPriceVal > 0 && item.other > 0 ? ' + ' : ''}${item.other > 0 ? 'Charges' : ''})</span>` : ''}
                        </td>
                        <td class="py-3 text-right font-bold text-gray-900 text-xs md:text-sm">${weightDisplay}</td>
                        <td class="py-3 text-right font-bold text-gray-500 text-xs md:text-sm">${rateDisplay}</td>
                        <td class="py-3 text-right font-black text-gray-900 text-xs md:text-sm pr-1">₹${item.total.toLocaleString('en-IN')}</td>
                        <td class="py-3 text-center internal-only no-print space-x-1">
                            <button type="button" onclick="editItem(${index})" class="text-amber-500 font-bold hover:text-amber-700">✏️</button>
                            <button type="button" onclick="deleteItem(${index})" class="text-red-400 font-bold hover:text-red-600">🗑️</button>
                        </td>
                    </tr>
                `;
            });

            tableHtml += `</tbody></table>`;
            wrapper.innerHTML = tableHtml;

            const taxApplied = inputs.taxToggle.checked;
            const gstAmount = taxApplied ? Math.round(grossSubtotal * 0.03) : 0;
            const finalGrandTotal = grossSubtotal + gstAmount;

            const grossRow = document.getElementById('invoiceGrossRow');
            const gstRow = document.getElementById('invoiceGstRow');

            if (taxApplied) {
                grossRow.classList.remove('hide-on-print');
                gstRow.classList.remove('hide-on-print');
            } else {
                grossRow.classList.add('hide-on-print'); 
                gstRow.classList.add('hide-on-print');
            }

            document.getElementById('itemCountLabel').innerText = `${items.length} Item${items.length > 1 ? 's' : ''} Added`;
            document.getElementById('prevGross').innerText = grossSubtotal.toLocaleString('en-IN');
            document.getElementById('prevTax').innerText = gstAmount.toLocaleString('en-IN');
            document.getElementById('invoiceGrandTotal').innerText = finalGrandTotal.toLocaleString('en-IN');
            document.getElementById('printGrandTotal').innerText = finalGrandTotal.toLocaleString('en-IN');
        }

        function executePrint(e) { 
            if (e) e.preventDefault(); 
            // 2. BLOCKS PRINT DIALOGUE IF MANDATORY FIELD MISSING
            if (!checkMandatoryDetails()) return;
            window.print(); 
        }

        function executeShare(e) {
            if (e) e.preventDefault();
            if (!checkMandatoryDetails()) return;
            
            const name = inputs.name.value.trim();
            const id = inputs.memoId.value;
            const grandTotal = document.getElementById('invoiceGrandTotal').innerText;
            
            let shareText = `*JINI JEWELS ESTIMATE*\nMemos No: ${id}\nCustomer: ${name}\n---------------------------\n`;
            items.forEach((item, idx) => { shareText += `${idx+1}. ${item.desc} - ₹${item.total.toLocaleString('en-IN')}\n`; });
            if(inputs.taxToggle.checked) { shareText += `Gst (3%): Included\n`; }
            shareText += `---------------------------\n*Total Payable: ₹${grandTotal}*\n_E&OE_`;

            if (navigator.share) { navigator.share({ title: 'Jini Jewels Estimate', text: shareText }); } 
            else { navigator.clipboard.writeText(shareText); alert("Estimate breakdown copied safely to clipboard!"); }
        }

        inputs.taxToggle.addEventListener('change', renderInvoice);
    </script>
</body>
</html>
