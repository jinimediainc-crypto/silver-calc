<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jini Client CRM & Ledger</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#064e3b">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script>enforceTerminalSecurity();</script>

    <style>
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        html, body { overflow-y: auto !important; height: auto !important; min-height: 100dvh !important; -webkit-overflow-scrolling: touch !important; }
    </style>
</head>
<body class="bg-gradient-to-br from-[#064e3b] via-[#022c22] to-gray-900 font-sans text-gray-800 min-h-screen w-full flex flex-col selection:bg-[#D4AF37] selection:text-gray-900">

    <div class="flex-shrink-0 bg-[#064e3b]/95 backdrop-blur-md shadow-md border-b border-white/10 z-10 sticky top-0">
        <div class="flex items-center px-4 py-3 max-w-7xl mx-auto w-full">
            <a href="index.html" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center border border-white/20 active:scale-90 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
            </a>
            <h1 class="flex-1 text-center text-lg md:text-xl font-black text-white tracking-widest uppercase mr-10">Client Ledger (Khata)</h1>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto w-full max-w-7xl mx-auto px-4 py-6 space-y-6 pb-48">
        
        <div class="bg-white/95 backdrop-blur-lg rounded-2xl p-4 shadow-xl border border-[#D4AF37] relative flex items-center gap-3">
            <div class="flex-1 relative">
                <input type="number" id="searchMobile" onkeypress="handleSearch(event)" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 pl-3 pr-12 text-sm font-black text-gray-900 outline-none focus:border-[#047857]" placeholder="🔍 Enter Customer Mobile Number..." />
            </div>
            <button type="button" onclick="lookupCustomer()" class="w-24 bg-[#064e3b] hover:bg-emerald-900 text-white font-black py-3 rounded-xl uppercase text-xs tracking-wider transition-colors shadow-md active:scale-95">Search</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-5 space-y-6 h-fit">
                
                <div class="bg-white/95 backdrop-blur-lg rounded-[1.5rem] p-5 shadow-2xl border border-white/10 space-y-4">
                    <div class="flex justify-between items-center border-b border-gray-100 pb-2 mb-2">
                        <h3 class="text-base font-black text-[#064e3b] uppercase tracking-wide">Client Profile</h3>
                        <span id="profileStatus" class="bg-gray-100 text-gray-500 text-[10px] font-black uppercase px-2 py-0.5 rounded-md tracking-wider">New Record</span>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1.5 uppercase">Full Name *</label>
                            <input type="text" id="crmName" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-bold text-gray-800 outline-none focus:border-[#047857]" placeholder="Customer Name" />
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1.5 uppercase">Mobile Number *</label>
                            <input type="number" id="crmMobile" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-bold text-gray-800 outline-none focus:border-[#047857]" placeholder="Mobile Number" readonly />
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-bold text-gray-600 mb-1.5 uppercase">Birth Date</label>
                                <input type="date" id="crmDob" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-bold text-gray-800 outline-none focus:border-[#047857]" />
                                <button type="button" onclick="sendGreeting('Birthday')" class="w-full mt-2 bg-[#25D366]/20 text-[#075E54] hover:bg-[#25D366] hover:text-white font-bold py-1.5 rounded-lg text-[10px] uppercase tracking-wide transition-colors">🎂 WhatsApp</button>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-600 mb-1.5 uppercase">Anniversary</label>
                                <input type="date" id="crmAnniversary" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-2.5 px-3 font-bold text-gray-800 outline-none focus:border-[#047857]" />
                                <button type="button" onclick="sendGreeting('Anniversary')" class="w-full mt-2 bg-[#25D366]/20 text-[#075E54] hover:bg-[#25D366] hover:text-white font-bold py-1.5 rounded-lg text-[10px] uppercase tracking-wide transition-colors">💍 WhatsApp</button>
                            </div>
                        </div>
                    </div>
                    <button type="button" onclick="saveCustomerProfile()" class="w-full bg-[#047857] hover:bg-[#064e3b] text-white font-black py-3.5 px-4 rounded-xl uppercase tracking-widest transition-all shadow-md mt-4 active:scale-95">💾 Update Profile</button>
                </div>

                <div id="debtSettlementCard" class="bg-red-50 border border-red-200 rounded-[1.5rem] p-5 shadow-lg hidden">
                    <h3 class="text-sm font-black text-red-800 uppercase border-b border-red-200 pb-2 mb-4">⚠️ Clear Pending Dues</h3>
                    
                    <div class="flex justify-between items-end mb-4">
                        <span class="text-red-800 text-xs font-bold uppercase tracking-wide">Total Balance Due</span>
                        <div class="text-right">
                            <span class="text-red-800 font-bold text-xl mr-1">₹</span>
                            <span id="activeDueDisplay" class="text-3xl font-black text-red-600">0</span>
                        </div>
                    </div>

                    <div class="space-y-3 bg-white p-4 rounded-xl border border-red-100">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Payment Mode</label>
                                <select id="settleMode" class="w-full bg-gray-50 border border-gray-200 rounded-lg py-2 px-2 text-sm font-bold outline-none focus:border-red-400">
                                    <option value="Cash">Cash 💵</option>
                                    <option value="UPI">UPI / Card 📱</option>
                                    <option value="Bank">Bank Transfer 🏦</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Amount Receiving (₹)</label>
                                <input type="number" id="settleAmount" class="w-full bg-emerald-50 border border-emerald-200 rounded-lg py-2 px-2 text-sm font-black text-emerald-800 outline-none focus:border-emerald-600" placeholder="0" />
                            </div>
                        </div>
                        <button type="button" onclick="processDebtSettlement()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-2.5 px-4 rounded-lg uppercase tracking-widest transition-all shadow-md active:scale-95 text-xs">✅ Receive Payment</button>
                    </div>
                </div>

            </div>

            <div class="lg:col-span-7 space-y-6">
                
                <div class="bg-gray-900 border border-[#D4AF37]/50 rounded-[1.5rem] p-6 text-left shadow-xl backdrop-blur-md relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-24 h-24 bg-[#D4AF37]/10 rounded-bl-full"></div>
                    <span class="text-[#D4AF37] text-xs font-black uppercase tracking-wider block mb-1">Lifetime Purchase Value (LTV)</span>
                    <div class="flex items-baseline">
                        <span class="text-[#D4AF37] font-bold text-3xl mr-1">₹</span>
                        <span id="statLtv" class="text-4xl font-black text-white">0</span>
                    </div>
                </div>

                <div class="bg-white/95 backdrop-blur-lg rounded-[1.5rem] p-5 shadow-2xl border border-white/10 flex flex-col h-auto">
                    <div class="border-b border-gray-100 pb-3 mb-4">
                        <h3 class="text-base font-black text-gray-800 uppercase tracking-wide">Ledger & History</h3>
                    </div>
                    
                    <div class="w-full overflow-x-auto">
                        <table class="w-full text-left text-xs border-collapse">
                            <thead>
                                <tr class="border-b-2 border-gray-200 text-gray-400 font-black uppercase text-[10px]">
                                    <th class="pb-2">Date</th>
                                    <th class="pb-2">Reference</th>
                                    <th class="pb-2">Details</th>
                                    <th class="pb-2 text-right">Inv Total</th>
                                    <th class="pb-2 text-right">Paid</th>
                                </tr>
                            </thead>
                            <tbody id="historyTableBody" class="divide-y divide-gray-100 font-bold text-gray-700 text-xs">
                                <tr><td colspan="5" class="text-center py-10 text-gray-300">Search a mobile number to view history...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-gray-950 border-t border-white/10 z-40 no-print" id="bottomNavbarMenu">
        <div class="flex overflow-x-auto no-scrollbar max-w-4xl mx-auto w-full px-2">
            <a href="retail.html" class="flex-shrink-0 w-[65px] py-3.5 hover:text-white flex flex-col items-center justify-center gap-0.5 text-[9px] font-black uppercase tracking-wider text-gray-400"><span class="text-base">✨</span><span>Retail</span></a>
            <a href="backoffice.html" class="flex-shrink-0 w-[65px] py-3.5 hover:text-white flex flex-col items-center justify-center gap-0.5 text-[9px] font-black uppercase tracking-wider text-gray-400"><span class="text-base">💼</span><span>Office</span></a>
            <a href="inventory.html" class="flex-shrink-0 w-[65px] py-3.5 hover:text-white flex flex-col items-center justify-center gap-0.5 text-[9px] font-black uppercase tracking-wider text-gray-400"><span class="text-base">📦</span><span>Stock</span></a>
            <a href="billing.html" class="flex-shrink-0 w-[65px] py-3.5 hover:text-white flex flex-col items-center justify-center gap-0.5 text-[9px] font-black uppercase tracking-wider text-gray-400"><span class="text-base">🧾</span><span>Billing</span></a>
            <a href="accounting.html" class="flex-shrink-0 w-[65px] py-3.5 hover:text-white flex flex-col items-center justify-center gap-0.5 text-[9px] font-black uppercase tracking-wider text-gray-400"><span class="text-base">📓</span><span>Account</span></a>
            <a href="crm.html" class="flex-shrink-0 w-[65px] py-3.5 text-[#D4AF37] bg-white/10 flex flex-col items-center justify-center gap-0.5 text-[9px] font-black uppercase tracking-wider rounded-lg my-0.5"><span class="text-base">🤝</span><span>CRM</span></a>
            <a href="hisab.html" class="flex-shrink-0 w-[65px] py-3.5 hover:text-white flex flex-col items-center justify-center gap-0.5 text-[9px] font-black uppercase tracking-wider text-gray-400"><span class="text-base">⚖️</span><span>Hisab</span></a>
            <a href="admin.html" class="flex-shrink-0 w-[65px] py-3.5 hover:text-white flex flex-col items-center justify-center gap-0.5 text-[9px] font-black uppercase tracking-wider text-gray-400"><span class="text-base">🛡️</span><span>Admin</span></a>
        </div>
    </div>

    <script>
        function formatCurrency(num) { return num.toLocaleString('en-IN'); }

        let currentPendingDue = 0;

        function handleSearch(e) {
            if (e.key === 'Enter') { e.preventDefault(); lookupCustomer(); }
        }

        function lookupCustomer() {
            const mobile = document.getElementById('searchMobile').value.trim();
            if (!mobile || mobile.length < 5) { alert("Enter a valid mobile number."); return; }

            document.getElementById('crmMobile').value = mobile;
            document.getElementById('profileStatus').innerText = "Searching...";
            
            // 1. Fetch Profile Data & Dues
            db.collection("client_profiles").doc(mobile).get().then((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('crmName').value = data.name || '';
                    document.getElementById('crmDob').value = data.dob || '';
                    document.getElementById('crmAnniversary').value = data.anniversary || '';
                    
                    currentPendingDue = parseFloat(data.pendingDue) || 0;
                    
                    if (currentPendingDue > 0) {
                        document.getElementById('debtSettlementCard').classList.remove('hidden');
                        document.getElementById('activeDueDisplay').innerText = formatCurrency(currentPendingDue);
                        document.getElementById('settleAmount').value = currentPendingDue; // Auto-fill
                    } else {
                        document.getElementById('debtSettlementCard').classList.add('hidden');
                    }
                    
                    document.getElementById('profileStatus').innerText = "Existing Client";
                    document.getElementById('profileStatus').className = "bg-emerald-100 text-emerald-700 text-[10px] font-black uppercase px-2 py-0.5 rounded-md";
                } else {
                    document.getElementById('crmName').value = ''; document.getElementById('crmDob').value = ''; document.getElementById('crmAnniversary').value = '';
                    currentPendingDue = 0; document.getElementById('debtSettlementCard').classList.add('hidden');
                    document.getElementById('profileStatus').innerText = "New Client";
                    document.getElementById('profileStatus').className = "bg-blue-100 text-blue-700 text-[10px] font-black uppercase px-2 py-0.5 rounded-md";
                }
            });

            // 2. Fetch Detailed Invoice & Payment Ledger
            db.collection("showroom_memos").where("customerMobile", "==", mobile).orderBy("localTimestamp", "desc").get().then((querySnapshot) => {
                const tableBody = document.getElementById('historyTableBody');
                tableBody.innerHTML = "";
                let lifetimeValue = 0;

                if (querySnapshot.empty) {
                    tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-gray-300 font-bold">No ledger history found.</td></tr>`;
                    document.getElementById('statLtv').innerText = "0";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    // Is this a normal invoice or a payment receipt?
                    const isPaymentReceipt = data.isPaymentReceipt === true;
                    
                    let invTotal = parseFloat(data.grandTotalPayable) || 0;
                    let amtPaid = parseFloat(data.amountPaid) || 0;
                    
                    if (!isPaymentReceipt) lifetimeValue += invTotal;

                    let detailsStr = "";
                    if (isPaymentReceipt) {
                        detailsStr = `<span class="text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded">Payment Received (${data.paymentMode})</span>`;
                    } else if (data.itemsListArray && data.itemsListArray.length > 0) {
                        detailsStr = data.itemsListArray.map(i => i.desc).join(", ");
                        if (detailsStr.length > 25) detailsStr = detailsStr.substring(0, 25) + "...";
                    }

                    const refStr = isPaymentReceipt ? "RECEIPT" : `#${data.estimateNumber}`;
                    const rowColor = isPaymentReceipt ? "bg-emerald-50/30" : "hover:bg-gray-50";

                    const tr = document.createElement('tr');
                    tr.className = `border-b border-gray-100 transition-colors ${rowColor}`;
                    tr.innerHTML = `
                        <td class="py-3 text-[10px] text-gray-500">${data.memoDate}</td>
                        <td class="py-3 font-black text-gray-800">${refStr}</td>
                        <td class="py-3 text-[10px] text-gray-600 truncate max-w-[120px]">${detailsStr}</td>
                        <td class="py-3 text-right font-black ${isPaymentReceipt ? 'text-gray-300' : 'text-[#064e3b]'}">₹${formatCurrency(invTotal)}</td>
                        <td class="py-3 text-right font-black ${isPaymentReceipt ? 'text-emerald-600' : 'text-gray-800'}">₹${formatCurrency(amtPaid)}</td>
                    `;
                    tableBody.appendChild(tr);
                });

                document.getElementById('statLtv').innerText = formatCurrency(lifetimeValue);
            });
        }

        function saveCustomerProfile() {
            const mobile = document.getElementById('crmMobile').value.trim();
            const name = document.getElementById('crmName').value.trim();
            if (!mobile || !name) { alert("Mobile Number and Name are mandatory."); return; }

            db.collection("client_profiles").doc(mobile).set({
                mobile: mobile, name: name, dob: document.getElementById('crmDob').value,
                anniversary: document.getElementById('crmAnniversary').value, lastUpdated: new Date().toISOString()
            }, { merge: true }).then(() => {
                alert(`✅ Profile for ${name} updated!`);
            });
        }

        // ----------------------------------------------------
        // ACCOUNTING SYNC: PROCESS PENDING DEBT PAYMENT
        // ----------------------------------------------------
        function processDebtSettlement() {
            const mobile = document.getElementById('crmMobile').value.trim();
            const name = document.getElementById('crmName').value.trim();
            const amount = parseFloat(document.getElementById('settleAmount').value) || 0;
            const mode = document.getElementById('settleMode').value;

            if (amount <= 0 || amount > currentPendingDue) {
                alert(`Invalid Amount. Please enter a value up to ₹${currentPendingDue}`);
                return;
            }

            if (!confirm(`Confirm receiving ₹${amount} via ${mode} from ${name}?`)) return;

            const today = new Date();
            const dateStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

            // 1. Create a Payment Receipt in showroom_memos (This automatically routes the cash to accounting.html!)
            const receiptPayload = {
                isPaymentReceipt: true,
                customerName: name,
                customerMobile: mobile,
                memoDate: dateStr,
                grandTotalPayable: 0, 
                amountPaid: amount,
                balanceDue: 0, 
                paymentMode: mode,
                localTimestamp: new Date().toISOString()
            };

            const memoRef = db.collection("showroom_memos").doc();
            let promises = [memoRef.set(receiptPayload)];

            // 2. Deduct debt from CRM profile
            const crmRef = db.collection("client_profiles").doc(mobile);
            promises.push(crmRef.set({
                pendingDue: firebase.firestore.FieldValue.increment(-amount)
            }, { merge: true }));

            Promise.all(promises).then(() => {
                alert(`✅ Payment of ₹${amount} received! Accounting Day-Book has been updated.`);
                lookupCustomer(); // Refresh screen
            }).catch(e => alert("Error processing payment: " + e.message));
        }

        function sendGreeting(eventType) {
            const mobile = document.getElementById('crmMobile').value.trim();
            const name = document.getElementById('crmName').value.trim() || "Valued Client";
            if (!mobile) return;
            let msg = eventType === "Birthday" 
                ? `Happy Birthday ${name}! 🎂\n\nShow this message to receive 50% off making charges on your next purchase!\n\n✨ Jini Jewels, Surat`
                : `Happy Anniversary ${name}! 💍\n\nShow this message to receive an exclusive VIP discount!\n\n✨ Jini Jewels, Surat`;
            window.open(`https://wa.me/91${mobile}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
