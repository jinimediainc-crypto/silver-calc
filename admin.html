<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jini Admin Control</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#064e3b">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script>enforceTerminalSecurity();</script>

    <style>
        html, body {
            overflow-y: auto !important;
            height: auto !important;
            min-height: 100dvh !important;
            -webkit-overflow-scrolling: touch !important;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#064e3b] via-[#022c22] to-gray-900 font-sans text-gray-800 h-[100dvh] w-screen flex flex-col overflow-hidden selection:bg-[#D4AF37] selection:text-gray-900">

    <div class="flex-shrink-0 bg-[#064e3b]/95 backdrop-blur-md shadow-md border-b border-white/10 z-10 sticky top-0">
        <div class="flex items-center px-4 py-3 max-w-7xl mx-auto w-full">
            <a href="index.html" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center border border-white/20 active:scale-90 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
            </a>
            <h1 class="flex-1 text-center text-lg font-black text-white tracking-widest uppercase mr-10">Admin Vault</h1>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto w-full max-w-4xl mx-auto px-4 py-6 space-y-6 pb-48">
        
        <div class="mt-2 mb-4 text-center">
            <span class="text-[#D4AF37] text-xs font-bold tracking-widest uppercase">System Control Center</span>
            <h2 class="text-3xl font-extrabold text-white mt-1 tracking-tight">Staff Management</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            
            <div class="md:col-span-5 bg-white/95 backdrop-blur-lg rounded-[1.5rem] p-5 shadow-2xl border border-white/10 h-fit">
                <h3 class="text-base font-black text-[#064e3b] uppercase border-b pb-2 mb-4">Register Employee</h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1.5 uppercase">Staff Email Address</label>
                        <input type="email" id="staffEmail" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 px-3 font-bold text-gray-800 outline-none focus:border-[#047857]" placeholder="staff@jinijewels.com" />
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1.5 uppercase">Assign Access Role</label>
                        <select id="staffRole" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 px-3 font-bold text-gray-800 outline-none focus:border-[#047857]">
                            <option value="Sales">Sales (Billing & Inventory Only)</option>
                            <option value="Manager">Manager (Includes Accounts & Backoffice)</option>
                            <option value="Owner">Owner (Full System Access)</option>
                        </select>
                    </div>
                </div>

                <button type="button" onclick="saveTeamMember()" class="w-full bg-[#047857] hover:bg-[#064e3b] text-white font-black py-3.5 px-4 rounded-xl uppercase tracking-widest transition-all shadow-md mt-6 active:scale-95">
                    🛡️ Grant Access
                </button>
            </div>

            <div class="md:col-span-7 bg-white/95 backdrop-blur-lg rounded-[1.5rem] p-5 shadow-2xl border border-white/10">
                <h3 class="text-base font-black text-gray-800 uppercase border-b pb-2 mb-4">Active System Users</h3>
                
                <div class="w-full overflow-x-auto">
                    <table class="w-full text-left text-xs border-collapse">
                        <thead>
                            <tr class="border-b-2 border-gray-200 text-gray-400 font-black uppercase text-[10px]">
                                <th class="pb-2">Account Email</th>
                                <th class="pb-2 text-center">Security Role</th>
                                <th class="pb-2 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="teamTableBody" class="divide-y divide-gray-100 font-bold text-gray-700 text-xs">
                            <tr><td colspan="3" class="text-center py-8 text-gray-300">Loading security profiles...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-gray-950 border-t border-white/10 z-40">
        <div class="grid grid-cols-6 text-center text-[10px] font-black uppercase tracking-wider text-gray-400 max-w-4xl mx-auto w-full">
            <a href="retail.html" class="py-3.5 hover:text-white border-r border-white/5 flex flex-col items-center justify-center gap-0.5"><span>✨</span><span class="scale-90">Retail</span></a>
            <a href="backoffice.html" class="py-3.5 hover:text-white border-r border-white/5 flex flex-col items-center justify-center gap-0.5"><span>💼</span><span class="scale-90">Office</span></a>
            <a href="inventory.html" class="py-3.5 hover:text-white border-r border-white/5 flex flex-col items-center justify-center gap-0.5"><span>📦</span><span class="scale-90">Stock</span></a>
            <a href="billing.html" class="py-3.5 hover:text-white border-r border-white/5 flex flex-col items-center justify-center gap-0.5"><span>🧾</span><span class="scale-90">Billing</span></a>
            <a href="accounting.html" class="py-3.5 hover:text-white border-r border-white/5 flex flex-col items-center justify-center gap-0.5"><span>📓</span><span class="scale-90">Accounts</span></a>
            <a href="admin.html" class="py-3.5 text-[#D4AF37] bg-white/10 flex flex-col items-center justify-center gap-0.5"><span>🛡️</span><span class="scale-90">Admin</span></a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetchTeamMembers();
        });

        function fetchTeamMembers() {
            db.collection("team_members").onSnapshot((snapshot) => {
                const tableBody = document.getElementById('teamTableBody');
                tableBody.innerHTML = "";

                if(snapshot.empty) {
                    tableBody.innerHTML = `<tr><td colspan="3" class="text-center py-8 text-gray-300">No users found.</td></tr>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-gray-100 hover:bg-gray-50/50";
                    
                    let roleBadge = "bg-gray-100 text-gray-600";
                    if(data.role === "Owner") roleBadge = "bg-[#D4AF37]/20 text-amber-700";
                    if(data.role === "Manager") roleBadge = "bg-blue-100 text-blue-700";
                    if(data.role === "Sales") roleBadge = "bg-emerald-100 text-emerald-700";

                    tr.innerHTML = `
                        <td class="py-3 font-bold text-gray-800">${data.email}</td>
                        <td class="py-3 text-center">
                            <span class="px-2.5 py-0.5 rounded-full text-[9px] font-black tracking-wide uppercase ${roleBadge}">${data.role}</span>
                        </td>
                        <td class="py-3 text-center">
                            <button type="button" onclick="removeTeamMember('${data.email}')" class="text-gray-300 hover:text-red-600 text-sm p-1 transition-colors">🗑️</button>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            });
        }

        function saveTeamMember() {
            const email = document.getElementById('staffEmail').value.trim().toLowerCase();
            const role = document.getElementById('staffRole').value;

            if(!email || !email.includes('@')) {
                alert("Please enter a valid email address.");
                return;
            }

            db.collection("team_members").doc(email).set({
                email: email,
                role: role,
                addedTimestamp: new Date().toISOString()
            }).then(() => {
                alert(`${email} has been granted ${role} access.`);
                document.getElementById('staffEmail').value = '';
            }).catch(e => alert("Error saving team member: " + e.message));
        }

        function removeTeamMember(email) {
            if(email === "jinijewelsco@gmail.com") {
                alert("Critical Action Blocked: You cannot delete the Master Owner account.");
                return;
            }

            if(!confirm(`Are you sure you want to revoke system access for ${email}?`)) return;

            db.collection("team_members").doc(email).delete().then(() => {
                alert("Access revoked successfully.");
            });
        }
    </script>
</body>
</html>
