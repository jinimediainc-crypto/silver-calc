<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail Calculator</title>
    <link rel="manifest" href="manifest-retail.json">
    <meta name="theme-color" content="#047857">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .focus-ring:focus { border-color: #047857; box-shadow: 0 0 0 2px rgba(4, 120, 87, 0.2); }
        .toggle-checkbox:checked { right: 0; border-color: #047857; }
        .toggle-checkbox:checked + .toggle-label { background-color: #047857; }
        .solve-radio:checked + label { background-color: #047857; color: white; border-color: #047857; }
        
        @keyframes marquee {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: flex;
            width: max-content;
            animation: marquee 15s linear infinite;
        }
        .animate-marquee:hover, .animate-marquee:active {
            animation-play-state: paused;
        }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen p-2 font-sans text-gray-800">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm md:max-w-lg lg:max-w-xl overflow-hidden border border-gray-200 flex flex-col transition-all duration-300">
        
        <button id="installAppBtn" class="hidden w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 text-xs md:text-sm uppercase tracking-widest transition-colors cursor-pointer">
            📲 Tap Here to Install App & Hide URL Bar
        </button>

        <div class="bg-gray-900 border-b border-[#D4AF37] text-emerald-400 text-[10px] md:text-xs font-bold tracking-widest py-2 overflow-hidden flex relative">
            <div class="animate-marquee whitespace-nowrap flex space-x-6 px-4" id="ticker-container">
                <span id="tick-xau">GOLD: --</span>
                <span id="tick-xag">SILV: --</span>
                <span id="tick-usd">USD: --</span>
                <span id="tick-eur">EUR: --</span>
                <span id="tick-gbp">GBP: --</span>
                <span id="tick-xau-2">GOLD: --</span>
                <span id="tick-xag-2">SILV: --</span>
                <span id="tick-usd-2">USD: --</span>
                <span id="tick-eur-2">EUR: --</span>
                <span id="tick-gbp-2">GBP: --</span>
            </div>
        </div>

        <div class="bg-[#047857] p-3 md:p-4 text-center border-b-2 border-[#D4AF37]">
            <h1 class="text-lg md:text-xl font-bold text-white tracking-widest uppercase">Calculator</h1>
        </div>

        <div class="p-4 md:p-6 space-y-4 md:space-y-6">
            
            <div class="grid grid-cols-2 gap-3 md:gap-4">
                <div class="bg-emerald-50 p-2 md:p-3 rounded-lg border border-emerald-100">
                    <label class="block text-[10px] md:text-xs font-bold text-emerald-800 uppercase mb-1">Global 'F'</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-2 md:pl-3 text-emerald-600 text-sm md:text-base font-bold">₹</span>
                        <input type="number" id="dailySilverRate" class="w-full bg-white border border-emerald-200 rounded-md py-1.5 md:py-2 pl-6 md:pl-8 pr-2 text-sm md:text-base font-bold outline-none focus-ring" placeholder="0" />
                    </div>
                </div>
                
                <div class="bg-stone-50 p-2 md:p-3 rounded-lg border border-stone-200">
                    <label class="block text-[10px] md:text-xs font-bold text-gray-500 uppercase mb-1">Tag ID</label>
                    <input type="text" id="cypherCode" class="w-full bg-white border border-gray-300 rounded-md py-1.5 md:py-2 px-2 text-center text-sm md:text-base font-bold tracking-widest uppercase outline-none focus-ring" placeholder="FRARXLAR" />
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2 md:gap-4 bg-gray-50 p-2.5 md:p-4 rounded-xl border border-gray-200 shadow-inner">
                <div>
                    <label class="block text-[9px] md:text-[11px] font-bold text-blue-800 uppercase mb-1 text-center">Item 'F'</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-1.5 md:pl-2.5 text-blue-600 text-xs md:text-sm font-bold">₹</span>
                        <input type="number" id="itemSilverRate" class="w-full bg-white border border-blue-200 rounded-md py-1.5 md:py-2 pl-4 md:pl-6 pr-1 text-sm md:text-base font-bold text-center outline-none focus-ring" placeholder="0" />
                    </div>
                </div>

                <div>
                    <label class="block text-[9px] md:text-[11px] font-bold text-gray-600 uppercase mb-1 text-center">L-Val</label>
                    <input type="number" id="labourCharge" class="w-full bg-white border border-gray-300 rounded-md py-1.5 md:py-2 px-1 text-sm md:text-base font-bold text-center outline-none focus-ring" placeholder="0" />
                </div>

                <div>
                    <label class="block text-[9px] md:text-[11px] font-bold text-gray-600 uppercase mb-1 text-center">Weight (g)</label>
                    <input type="number" id="weight" class="w-full bg-white border border-gray-300 rounded-md py-1.5 md:py-2 px-1 text-sm md:text-base font-bold text-center outline-none focus-ring" placeholder="0" />
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 md:gap-4">
                <div class="bg-stone-50 p-2 md:p-3 rounded-lg border border-stone-200">
                    <label class="block text-[10px] md:text-xs font-bold text-gray-600 uppercase mb-1">Other (₹)</label>
                    <input type="number" id="otherCharges" class="w-full bg-white border border-gray-300 rounded-md py-1.5 md:py-2 px-2 text-sm md:text-base font-bold text-center outline-none focus-ring" placeholder="0" />
                </div>
                
                <div class="bg-emerald-50/50 p-2 md:p-3 rounded-lg border border-emerald-100 flex flex-col justify-center text-center">
                    <span class="block text-[9px] md:text-[11px] font-bold text-emerald-800/60 uppercase mb-0.5">Total Base</span>
                    <span class="text-lg md:text-xl font-extrabold text-[#047857]">₹ <span id="baseRateDisplay">0</span></span>
                </div>
            </div>

            <div class="bg-gray-50 p-3 md:p-4 rounded-xl border border-gray-200 flex justify-between items-center gap-2">
                <div class="flex items-center gap-2">
                    <div class="relative inline-block w-8 md:w-10 h-4 md:h-5 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" id="hmToggle" class="toggle-checkbox absolute block w-4 md:w-5 h-4 md:h-5 rounded-full bg-white border-2 border-gray-300 appearance-none cursor-pointer transition-all duration-300 z-10" />
                        <label for="hmToggle" class="toggle-label block overflow-hidden h-4 md:h-5 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300"></label>
                    </div>
                    <span class="text-[10px] md:text-xs font-bold text-gray-600 uppercase">HUID</span>
                    <input type="number" id="hmCharge" class="w-12 md:w-16 bg-white border border-gray-300 rounded text-center text-xs md:text-sm font-bold py-0.5 md:py-1 outline-none focus-ring transition-opacity" placeholder="50" value="50" style="opacity: 0.4;" />
                </div>

                <div class="flex items-center gap-2 border-l border-gray-300 pl-3 md:pl-4">
                    <div class="relative inline-block w-8 md:w-10 h-4 md:h-5 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" id="gstToggle" class="toggle-checkbox absolute block w-4 md:w-5 h-4 md:h-5 rounded-full bg-white border-2 border-gray-300 appearance-none cursor-pointer transition-all duration-300 z-10" />
                        <label for="gstToggle" class="toggle-label block overflow-hidden h-4 md:h-5 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300"></label>
                    </div>
                    <span class="text-[10px] md:text-xs font-bold text-gray-600 uppercase" id="gstLabel" style="opacity: 0.4;">GST 3%</span>
                </div>
            </div>

        </div>

        <div class="bg-gray-900 p-4 md:p-6 border-t-4 border-[#D4AF37]">
            <div class="flex justify-between items-center mb-2 md:mb-4 border-b border-gray-700 pb-2 md:pb-3">
                <span class="text-gray-400 text-[9px] md:text-[11px] font-bold uppercase tracking-widest">When Total Changes:</span>
                <div class="flex space-x-1 bg-gray-800 rounded p-0.5 md:p-1 border border-gray-700">
                    <input type="radio" id="solveLabour" name="solveMode" value="labour" class="solve-radio hidden" checked>
                    <label for="solveLabour" class="text-[9px] md:text-[10px] font-bold uppercase px-2 py-1 md:px-3 md:py-1.5 rounded cursor-pointer text-gray-400 transition-colors">Solve L-Val</label>
                    
                    <input type="radio" id="solveF" name="solveMode" value="f_rate" class="solve-radio hidden">
                    <label for="solveF" class="text-[9px] md:text-[10px] font-bold uppercase px-2 py-1 md:px-3 md:py-1.5 rounded cursor-pointer text-gray-400 transition-colors">Solve 'F'</label>
                </div>
            </div>

            <div class="flex justify-between items-center mt-2">
                <span class="text-white text-sm md:text-lg font-bold uppercase tracking-widest">Total</span>
                <div class="relative w-2/3 flex justify-end">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-emerald-500 font-bold text-2xl md:text-3xl">₹</span>
                    <input type="number" id="grandTotal" class="w-full bg-transparent border-none rounded-lg py-1 md:py-2 pl-10 pr-2 text-3xl md:text-4xl font-extrabold text-white text-right outline-none focus:ring-2 focus:ring-[#D4AF37] transition-all" placeholder="0" />
                </div>
            </div>
        </div>

    </div>

    <script>
        const INDIAN_MARKET_MULTIPLIER = 1.14; 
        const GOLD_OFFSET_PER_GRAM = 0;     
        const SILVER_OFFSET_PER_GRAM = 0;   

        // --- PWA INSTALL BUTTON LOGIC ---
        let deferredPrompt;
        const installBtn = document.getElementById('installAppBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent Chrome from showing the default prompt
            e.preventDefault();
            deferredPrompt = e;
            // Show our custom blue button
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });

        // --- LIVE TICKER DATA FETCH ---
        async function fetchLiveRates() {
            try {
                const fiatRes = await fetch('https://open.er-api.com/v6/latest/USD');
                if (!fiatRes.ok) throw new Error("Fiat API down");
                const fiatData = await fiatRes.json();
                
                const inr = fiatData.rates.INR;
                const eur = inr / fiatData.rates.EUR;
                const gbp = inr / fiatData.rates.GBP;
                
                document.getElementById('tick-usd').innerText = `USD: ₹${inr.toFixed(2)}`;
                document.getElementById('tick-eur').innerText = `EUR: ₹${eur.toFixed(2)}`;
                document.getElementById('tick-gbp').innerText = `GBP: ₹${gbp.toFixed(2)}`;
                document.getElementById('tick-usd-2').innerText = `USD: ₹${inr.toFixed(2)}`;
                document.getElementById('tick-eur-2').innerText = `EUR: ₹${eur.toFixed(2)}`;
                document.getElementById('tick-gbp-2').innerText = `GBP: ₹${gbp.toFixed(2)}`;

                const metalRes = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
                if (metalRes.ok) {
                    const metalData = await metalRes.json();
                    if(metalData.usd.xau) {
                        const goldOzUsd = 1 / metalData.usd.xau;
                        const goldGramInrIndian = ((goldOzUsd * inr) / 31.1035 * INDIAN_MARKET_MULTIPLIER) + GOLD_OFFSET_PER_GRAM;
                        document.getElementById('tick-xau').innerText = `GOLD: ₹${Math.round(goldGramInrIndian)}/g`;
                        document.getElementById('tick-xau-2').innerText = `GOLD: ₹${Math.round(goldGramInrIndian)}/g`;
                    }
                    if(metalData.usd.xag) {
                        const silverOzUsd = 1 / metalData.usd.xag;
                        const silverGramInrIndian = ((silverOzUsd * inr) / 31.1035 * INDIAN_MARKET_MULTIPLIER) + SILVER_OFFSET_PER_GRAM;
                        document.getElementById('tick-xag').innerText = `SILV: ₹${Math.round(silverGramInrIndian)}/g`;
                        document.getElementById('tick-xag-2').innerText = `SILV: ₹${Math.round(silverGramInrIndian)}/g`;
                    }
                }
            } catch (error) {
                const offlineMsg = '<span class="text-red-400">LIVE MARKET DATA OFFLINE — CALCULATOR RUNNING LOCALLY</span>';
                document.getElementById('ticker-container').innerHTML = offlineMsg + '&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;' + offlineMsg;
            }
        }
        fetchLiveRates();

        // --- CALCULATOR LOGIC ---
        const decodeMap = { 's':'0', 'i':'1', 'l':'2', 'v':'3', 'e':'4', 'r':'5', 'b':'6', 'a':'7', 'n':'8', 'k':'9' };
        const encodeMap = { '0':'s', '1':'i', '2':'l', '3':'v', '4':'e', '5':'r', '6':'b', '7':'a', '8':'n', '9':'k' };

        const els = {
            dailyRate: document.getElementById('dailySilverRate'),
            itemRate: document.getElementById('itemSilverRate'),
            code: document.getElementById('cypherCode'),
            labour: document.getElementById('labourCharge'),
            baseRateDisplay: document.getElementById('baseRateDisplay'),
            weight: document.getElementById('weight'),
            other: document.getElementById('otherCharges'),
            hmToggle: document.getElementById('hmToggle'),
            hmCharge: document.getElementById('hmCharge'),
            gstToggle: document.getElementById('gstToggle'),
            gstLabel: document.getElementById('gstLabel'),
            total: document.getElementById('grandTotal'),
            solveModeInputs: document.getElementsByName('solveMode')
        };

        let isCalculating = false;

        const savedRate = localStorage.getItem('retail_compact_silverRate') || '';
        els.dailyRate.value = savedRate;
        els.itemRate.value = savedRate; 
        
        els.hmToggle.checked = localStorage.getItem('retail_hmToggle') === 'true';
        els.gstToggle.checked = localStorage.getItem('retail_gstToggle') === 'true';
        if (localStorage.getItem('retail_hmCharge')) els.hmCharge.value = localStorage.getItem('retail_hmCharge');
        
        updateToggleStyles();

        const getSolveMode = () => {
            for (const radio of els.solveModeInputs) {
                if (radio.checked) return radio.value;
            }
            return 'labour';
        };

        els.dailyRate.addEventListener('input', (e) => {
            const val = e.target.value;
            localStorage.setItem('retail_compact_silverRate', val);
            if (!els.itemRate.value) els.itemRate.value = val; 
            triggerForwardCalc();
        });
        
        els.itemRate.addEventListener('input', () => updateCompoundTag());

        els.hmToggle.addEventListener('change', (e) => {
            localStorage.setItem('retail_hmToggle', e.target.checked);
            updateToggleStyles();
            triggerForwardCalc();
        });
        els.hmCharge.addEventListener('input', (e) => {
            localStorage.setItem('retail_hmCharge', e.target.value);
            triggerForwardCalc();
        });
        els.gstToggle.addEventListener('change', (e) => {
            localStorage.setItem('retail_gstToggle', e.target.checked);
            updateToggleStyles();
            triggerForwardCalc();
        });

        function updateToggleStyles() {
            els.hmCharge.style.opacity = els.hmToggle.checked ? '1' : '0.4';
            els.gstLabel.style.opacity = els.gstToggle.checked ? '1' : '0.4';
        }

        const getGlobalSilverRate = () => parseFloat(els.dailyRate.value) || 0;
        const getItemSilverRate = () => parseFloat(els.itemRate.value) || 0;

        const encodeNumber = (num) => {
            let str = Math.round(num).toString();
            let text = '';
            for (let char of str) {
                if (encodeMap[char] !== undefined) text += encodeMap[char];
            }
            return text.toUpperCase();
        };

        const decodeStandard = (text) => {
            let numStr = '';
            const lowerText = text.toLowerCase();
            let startIndex = lowerText.startsWith('f') ? 1 : 0; 
            for (let i = startIndex; i < lowerText.length; i++) {
                if (decodeMap[lowerText[i]] !== undefined) {
                    numStr += decodeMap[lowerText[i]];
                }
            }
            return parseInt(numStr) || 0;
        };

        const updateBaseRateDisplay = (labourVal) => {
            const globalSilver = getGlobalSilverRate();
            const hasF = els.code.value.toLowerCase().startsWith('f') || (!els.code.value && labourVal > 0);
            
            let totalBase = 0;
            if (els.code.value || labourVal > 0) {
                totalBase = (hasF ? globalSilver : 0) + labourVal;
            }
            
            totalBase = Math.round(totalBase);
            els.baseRateDisplay.innerText = totalBase;
            return totalBase;
        };

        const updateCompoundTag = () => {
            const labourVal = parseFloat(els.labour.value) || 0;
            const itemSilverVal = getItemSilverRate();
            
            if (labourVal > 0) {
                let newTag = 'F' + encodeNumber(labourVal);
                if (itemSilverVal > 0) {
                    newTag += 'X' + encodeNumber(itemSilverVal);
                }
                els.code.value = newTag;
            } else {
                els.code.value = '';
            }
        };

        function triggerForwardCalc() {
            if (isCalculating) return;
            isCalculating = true;

            const labour = parseFloat(els.labour.value) || 0;
            const baseRate = updateBaseRateDisplay(labour); 
            const weight = parseFloat(els.weight.value) || 0;
            const other = parseFloat(els.other.value) || 0;
            const hm = els.hmToggle.checked ? (parseFloat(els.hmCharge.value) || 0) : 0;

            if (weight > 0 && baseRate > 0) {
                let subTotal = (baseRate * weight) + other + hm;
                let finalTotal = els.gstToggle.checked ? (subTotal * 1.03) : subTotal;
                els.total.value = Math.round(finalTotal);
            } else {
                els.total.value = ''; 
            }

            isCalculating = false;
        }

        els.code.addEventListener('input', () => {
            if (isCalculating) return;
            isCalculating = true;
            
            const fullTag = els.code.value.toLowerCase();
            let labourPart = fullTag;
            
            if (fullTag.includes('x')) {
                const parts = fullTag.split('x');
                labourPart = parts[0];
                const silverPart = parts[1];
                if (silverPart) {
                    const historicalSilver = decodeStandard(silverPart);
                    if (historicalSilver > 0) els.itemRate.value = historicalSilver;
                }
            }
            
            els.labour.value = decodeStandard(labourPart) || '';
            isCalculating = false;
            triggerForwardCalc();
        });

        els.labour.addEventListener('input', () => {
            if (isCalculating) return;
            isCalculating = true;
            updateCompoundTag();
            isCalculating = false;
            triggerForwardCalc();
        });

        els.total.addEventListener('input', () => {
            if (isCalculating) return;
            isCalculating = true;

            const total = parseFloat(els.total.value) || 0;
            const weight = parseFloat(els.weight.value) || 0;
            const other = parseFloat(els.other.value) || 0;
            const hm = els.hmToggle.checked ? (parseFloat(els.hmCharge.value) || 0) : 0;
            
            const globalSilver = getGlobalSilverRate();
            const currentLabour = parseFloat(els.labour.value) || 0;
            const solveMode = getSolveMode();

            if (weight > 0 && total > 0) {
                let targetSubTotal = els.gstToggle.checked ? (total / 1.03) : total;
                let requiredBaseRate = (targetSubTotal - other - hm) / weight;
                
                if (solveMode === 'labour') {
                    let roundedLabour = Math.round(Math.max(0, requiredBaseRate - globalSilver));
                    els.labour.value = roundedLabour;
                    updateCompoundTag();
                    updateBaseRateDisplay(roundedLabour);
                } else if (solveMode === 'f_rate') {
                    let roundedF = Math.round(Math.max(0, requiredBaseRate - currentLabour));
                    els.dailyRate.value = roundedF;
                    els.itemRate.value = roundedF;
                    localStorage.setItem('retail_compact_silverRate', roundedF);
                    updateCompoundTag(); 
                    updateBaseRateDisplay(currentLabour);
                }
            }

            isCalculating = false;
        });

        els.weight.addEventListener('input', triggerForwardCalc);
        els.other.addEventListener('input', triggerForwardCalc);
        for (const radio of els.solveModeInputs) radio.addEventListener('change', triggerForwardCalc);

        triggerForwardCalc();

        // --- PWA SERVICE WORKER REGISTRATION ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then((registration) => {
                    registration.update(); 
                }).catch((error) => console.log('SW failed: ', error));
            });
        }
    </script>
</body>
</html>
