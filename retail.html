<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail Calculator</title>
    <link rel="manifest" href="manifest-retail.json">
    <meta name="theme-color" content="#064e3b">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .focus-ring:focus { border-color: #047857; box-shadow: 0 0 0 3px rgba(4, 120, 87, 0.3); }
        .toggle-checkbox:checked { right: 0; border-color: #047857; }
        .toggle-checkbox:checked + .toggle-label { background-color: #047857; }
        .solve-radio:checked + label { background-color: #047857; color: white; border-color: #047857; }
        
        @keyframes marquee { 0% { transform: translateX(0%); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: flex; width: max-content; animation: marquee 15s linear infinite; }
    </style>
</head>
<body class="bg-gradient-to-br from-[#064e3b] via-[#022c22] to-gray-900 flex justify-center items-center min-h-[100dvh] font-sans text-gray-800 p-3 md:p-6">

    <div class="bg-white/95 backdrop-blur-xl rounded-[2rem] shadow-[0_0_40px_rgba(0,0,0,0.5)] w-full max-w-md md:max-w-xl flex flex-col border border-white/20 overflow-hidden relative my-auto">
        
        <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200/50 bg-white/50">
            <a href="index.html" class="text-[#047857] p-1 bg-emerald-50 rounded-lg active:scale-90 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
            </a>
            <h1 class="text-sm md:text-base font-black text-[#064e3b] tracking-widest uppercase">Jini Retail</h1>
            <div class="w-8"></div>
        </div>

        <div class="bg-gray-900 text-emerald-400 text-[9px] md:text-xs font-bold tracking-widest py-1.5 overflow-hidden flex relative border-b border-[#D4AF37]">
            <div class="animate-marquee whitespace-nowrap flex space-x-8 px-4" id="ticker-container">
                <span id="tick-xau">GOLD: --</span><span id="tick-xag">SILV: --</span>
                <span id="tick-usd">USD: --</span><span id="tick-eur">EUR: --</span>
                <span id="tick-xau-2">GOLD: --</span><span id="tick-xag-2">SILV: --</span>
                <span id="tick-usd-2">USD: --</span><span id="tick-eur-2">EUR: --</span>
            </div>
        </div>

        <div class="flex flex-col p-4 md:p-6 space-y-3.5">
            
            <div class="grid grid-cols-3 gap-2 p-2.5 bg-emerald-50/50 rounded-2xl border border-emerald-100 shadow-sm">
                <div class="col-span-3 grid grid-cols-2 gap-2 mb-1">
                    <div class="bg-white p-2 rounded-xl border-2 border-[#047857] shadow-sm">
                        <label class="block text-[10px] md:text-xs font-black text-[#047857] uppercase mb-0.5 tracking-wide">Today's Rate</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-emerald-700 text-lg font-bold">₹</span>
                            <input type="number" id="dailySilverRate" class="w-full bg-transparent py-1 pl-6 pr-1 text-xl md:text-2xl font-black text-gray-900 outline-none focus-ring" placeholder="0" />
                        </div>
                    </div>
                    
                    <div class="bg-white p-2 rounded-xl border border-gray-300 shadow-sm">
                        <label class="block text-[10px] md:text-xs font-black text-gray-700 uppercase mb-0.5 tracking-wide">Weight (g)</label>
                        <input type="number" id="weight" class="w-full bg-transparent py-1 px-2 text-center text-xl md:text-2xl font-black text-gray-900 outline-none focus-ring" placeholder="0" />
                    </div>
                </div>

                <div class="col-span-3 bg-white p-2 rounded-xl border border-gray-300 shadow-sm flex items-center justify-between">
                    <label class="text-[10px] md:text-xs font-black text-gray-700 uppercase tracking-wide ml-1">Labour (L-Val)</label>
                    <input type="number" id="labourCharge" class="w-24 md:w-32 bg-gray-50 border border-gray-200 rounded-lg py-1 px-2 text-center text-lg md:text-xl font-bold text-gray-900 outline-none focus-ring" placeholder="0" />
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="col-span-2 bg-stone-100 p-3 rounded-xl border border-stone-200 shadow-inner">
                    <label class="block text-[9px] md:text-[10px] font-bold text-gray-500 uppercase mb-1 text-center tracking-widest">Cypher Tag</label>
                    <input type="text" id="cypherCode" class="w-full bg-white border border-gray-300 rounded-lg py-2 px-2 text-center text-lg md:text-xl font-black tracking-[0.2em] uppercase outline-none focus-ring" placeholder="FRARXLAR" />
                </div>

                <div class="col-span-1 bg-gray-100 p-3 rounded-xl border border-gray-200 flex flex-col justify-center">
                    <label class="block text-[8px] md:text-[9px] font-bold text-gray-400 uppercase mb-0.5 text-center">Old Cost</label>
                    <input type="number" id="itemSilverRate" class="w-full bg-transparent border-none py-1 px-1 text-center text-sm md:text-base font-bold text-gray-500 outline-none" placeholder="0" />
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-gray-50 p-2.5 rounded-xl border border-gray-200 flex items-center justify-between px-3">
                    <label class="text-[10px] font-bold text-gray-600 uppercase">Other ₹</label>
                    <input type="number" id="otherCharges" class="w-16 bg-white border border-gray-300 rounded-md py-1 text-center text-sm font-bold outline-none focus-ring" placeholder="0" />
                </div>
                <div class="bg-emerald-50 p-2.5 rounded-xl border border-emerald-100 flex items-center justify-between px-3">
                    <span class="text-[10px] font-bold text-emerald-800/70 uppercase">Base</span>
                    <span class="text-base md:text-lg font-black text-[#047857]">₹ <span id="baseRateDisplay">0</span></span>
                </div>
            </div>

            <div class="bg-gray-50 p-3 rounded-xl border border-gray-200 flex justify-around items-center">
                <div class="flex items-center gap-2">
                    <div class="relative inline-block w-8 h-4 align-middle select-none">
                        <input type="checkbox" id="hmToggle" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-2 border-gray-300 appearance-none cursor-pointer z-10 transition-all" />
                        <label for="hmToggle" class="toggle-label block overflow-hidden h-4 rounded-full bg-gray-300 cursor-pointer transition-colors"></label>
                    </div>
                    <span class="text-[9px] font-bold text-gray-600 uppercase">HUID</span>
                    <input type="number" id="hmCharge" class="w-10 bg-white border border-gray-300 rounded text-center text-[10px] font-bold py-0.5 outline-none focus-ring opacity-40" placeholder="50" value="50" />
                </div>
                <div class="w-px h-6 bg-gray-300"></div>
                <div class="flex items-center gap-2">
                    <div class="relative inline-block w-8 h-4 align-middle select-none">
                        <input type="checkbox" id="gstToggle" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-2 border-gray-300 appearance-none cursor-pointer z-10 transition-all" />
                        <label for="gstToggle" class="toggle-label block overflow-hidden h-4 rounded-full bg-gray-300 cursor-pointer transition-colors"></label>
                    </div>
                    <span class="text-[9px] font-bold text-gray-600 uppercase opacity-40" id="gstLabel">GST 3%</span>
                </div>
            </div>

        </div>

        <div class="bg-gray-900 px-5 py-4 border-t-[3px] border-[#D4AF37]">
            <div class="flex justify-between items-center mb-3">
                <div class="flex space-x-1 bg-gray-800 rounded p-0.5 border border-gray-700">
                    <input type="radio" id="solveLabour" name="solveMode" value="labour" class="solve-radio hidden" checked>
                    <label for="solveLabour" class="text-[9px] md:text-[10px] font-bold uppercase px-3 py-1 rounded cursor-pointer text-gray-400 transition-colors">Solve L-Val</label>
                    <input type="radio" id="solveF" name="solveMode" value="f_rate" class="solve-radio hidden">
                    <label for="solveF" class="text-[9px] md:text-[10px] font-bold uppercase px-3 py-1 rounded cursor-pointer text-gray-400 transition-colors">Solve Cost</label>
                </div>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-white text-lg md:text-xl font-black uppercase tracking-widest">Total</span>
                <div class="relative w-2/3 flex justify-end">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-emerald-500 font-bold text-3xl">₹</span>
                    <input type="number" id="grandTotal" class="w-full bg-transparent border-none py-1 pl-10 pr-1 text-4xl md:text-5xl font-black text-white text-right outline-none focus:ring-2 focus:ring-[#D4AF37] rounded transition-all" placeholder="0" />
                </div>
            </div>
        </div>

    </div>

    <script>
        const INDIAN_MARKET_MULTIPLIER = 1.14; 
        const GOLD_OFFSET_PER_GRAM = 0;     
        const SILVER_OFFSET_PER_GRAM = 0;   

        async function fetchLiveRates() {
            try {
                const fiatRes = await fetch('https://open.er-api.com/v6/latest/USD');
                if (!fiatRes.ok) throw new Error("Fiat API down");
                const fiatData = await fiatRes.json();
                const inr = fiatData.rates.INR;
                const eur = inr / fiatData.rates.EUR;
                document.getElementById('tick-usd').innerText = `USD: ₹${inr.toFixed(2)}`;
                document.getElementById('tick-eur').innerText = `EUR: ₹${eur.toFixed(2)}`;
                document.getElementById('tick-usd-2').innerText = `USD: ₹${inr.toFixed(2)}`;
                document.getElementById('tick-eur-2').innerText = `EUR: ₹${eur.toFixed(2)}`;

                const metalRes = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json');
                if (metalRes.ok) {
                    const metalData = await metalRes.json();
                    if(metalData.usd.xau) {
                        const goldOzUsd = 1 / metalData.usd.xau;
                        const goldInr = ((goldOzUsd * inr) / 31.1035 * INDIAN_MARKET_MULTIPLIER) + GOLD_OFFSET_PER_GRAM;
                        document.getElementById('tick-xau').innerText = `GOLD: ₹${Math.round(goldInr)}/g`;
                        document.getElementById('tick-xau-2').innerText = `GOLD: ₹${Math.round(goldInr)}/g`;
                    }
                    if(metalData.usd.xag) {
                        const silverOzUsd = 1 / metalData.usd.xag;
                        const silverInr = ((silverOzUsd * inr) / 31.1035 * INDIAN_MARKET_MULTIPLIER) + SILVER_OFFSET_PER_GRAM;
                        document.getElementById('tick-xag').innerText = `SILV: ₹${Math.round(silverInr)}/g`;
                        document.getElementById('tick-xag-2').innerText = `SILV: ₹${Math.round(silverInr)}/g`;
                    }
                }
            } catch (error) {
                const off = '<span class="text-red-400">DATA OFFLINE</span>';
                document.getElementById('ticker-container').innerHTML = off + '&nbsp;&nbsp;&nbsp;&nbsp;' + off;
            }
        }
        fetchLiveRates();

        const decodeMap = { 's':'0', 'i':'1', 'l':'2', 'v':'3', 'e':'4', 'r':'5', 'b':'6', 'a':'7', 'n':'8', 'k':'9' };
        const encodeMap = { '0':'s', '1':'i', '2':'l', '3':'v', '4':'e', '5':'r', '6':'b', '7':'a', '8':'n', '9':'k' };

        const els = {
            dailyRate: document.getElementById('dailySilverRate'),
            itemRate: document.getElementById('itemSilverRate'),
            code: document.getElementById('cypherCode'),
            labour: document.getElementById('labourCharge'),
            baseRateDisplay: document.getElementById('baseRateDisplay'),
            weight: document.getElementById('weight'),
            other: document.getElementById('otherCharges'),
            hmToggle: document.getElementById('hmToggle'),
            hmCharge: document.getElementById('hmCharge'),
            gstToggle: document.getElementById('gstToggle'),
            gstLabel: document.getElementById('gstLabel'),
            total: document.getElementById('grandTotal'),
            solveModeInputs: document.getElementsByName('solveMode')
        };

        let isCalculating = false;

        els.dailyRate.value = localStorage.getItem('retail_compact_silverRate') || '';
        els.itemRate.value = els.dailyRate.value; 
        els.hmToggle.checked = localStorage.getItem('retail_hmToggle') === 'true';
        els.gstToggle.checked = localStorage.getItem('retail_gstToggle') === 'true';
        if (localStorage.getItem('retail_hmCharge')) els.hmCharge.value = localStorage.getItem('retail_hmCharge');
        
        function updateToggleStyles() {
            els.hmCharge.style.opacity = els.hmToggle.checked ? '1' : '0.4';
            els.gstLabel.style.opacity = els.gstToggle.checked ? '1' : '0.4';
        }
        updateToggleStyles();

        const getSolveMode = () => Array.from(els.solveModeInputs).find(r => r.checked).value;
        const encodeNumber = (num) => Math.round(num).toString().split('').map(c => encodeMap[c]||'').join('').toUpperCase();
        const decodeStandard = (text) => {
            let numStr = '';
            const t = text.toLowerCase();
            for (let i = t.startsWith('f')?1:0; i < t.length; i++) if (decodeMap[t[i]]) numStr += decodeMap[t[i]];
            return parseInt(numStr) || 0;
        };

        const updateBaseRateDisplay = (labourVal) => {
            const hasF = els.code.value.toLowerCase().startsWith('f') || (!els.code.value && labourVal > 0);
            const totalBase = Math.round((hasF ? (parseFloat(els.dailyRate.value)||0) : 0) + labourVal);
            els.baseRateDisplay.innerText = totalBase;
            return totalBase;
        };

        const updateCompoundTag = () => {
            const l = parseFloat(els.labour.value) || 0;
            const i = parseFloat(els.itemRate.value) || 0;
            els.code.value = l > 0 ? ('F' + encodeNumber(l) + (i > 0 ? 'X' + encodeNumber(i) : '')) : '';
        };

        function triggerForwardCalc() {
            if (isCalculating) return;
            isCalculating = true;
            const b = updateBaseRateDisplay(parseFloat(els.labour.value)||0); 
            const w = parseFloat(els.weight.value)||0;
            const hm = els.hmToggle.checked ? (parseFloat(els.hmCharge.value)||0) : 0;
            if (w > 0 && b > 0) {
                let sub = (b * w) + (parseFloat(els.other.value)||0) + hm;
                els.total.value = Math.round(els.gstToggle.checked ? sub * 1.03 : sub);
            } else els.total.value = ''; 
            isCalculating = false;
        }

        els.dailyRate.addEventListener('input', (e) => {
            localStorage.setItem('retail_compact_silverRate', e.target.value);
            if (!els.itemRate.value) els.itemRate.value = e.target.value; 
            triggerForwardCalc();
        });
        
        els.itemRate.addEventListener('input', updateCompoundTag);
        els.hmToggle.addEventListener('change', (e) => { localStorage.setItem('retail_hmToggle', e.target.checked); updateToggleStyles(); triggerForwardCalc(); });
        els.hmCharge.addEventListener('input', (e) => { localStorage.setItem('retail_hmCharge', e.target.value); triggerForwardCalc(); });
        els.gstToggle.addEventListener('change', (e) => { localStorage.setItem('retail_gstToggle', e.target.checked); updateToggleStyles(); triggerForwardCalc(); });

        els.code.addEventListener('input', () => {
            if (isCalculating) return;
            isCalculating = true;
            const t = els.code.value.toLowerCase().split('x');
            if (t[1]) els.itemRate.value = decodeStandard(t[1]) || els.itemRate.value;
            els.labour.value = decodeStandard(t[0]) || '';
            isCalculating = false;
            triggerForwardCalc();
        });

        els.labour.addEventListener('input', () => {
            if (isCalculating) return;
            isCalculating = true; updateCompoundTag(); isCalculating = false; triggerForwardCalc();
        });

        els.total.addEventListener('input', () => {
            if (isCalculating) return;
            isCalculating = true;
            const w = parseFloat(els.weight.value)||0, t = parseFloat(els.total.value)||0;
            if (w > 0 && t > 0) {
                let reqBase = ((els.gstToggle.checked ? t / 1.03 : t) - (parseFloat(els.other.value)||0) - (els.hmToggle.checked ? (parseFloat(els.hmCharge.value)||0) : 0)) / w;
                if (getSolveMode() === 'labour') {
                    els.labour.value = Math.round(Math.max(0, reqBase - (parseFloat(els.dailyRate.value)||0)));
                } else {
                    els.dailyRate.value = els.itemRate.value = Math.round(Math.max(0, reqBase - (parseFloat(els.labour.value)||0)));
                    localStorage.setItem('retail_compact_silverRate', els.dailyRate.value);
                }
                updateCompoundTag(); updateBaseRateDisplay(parseFloat(els.labour.value)||0);
            }
            isCalculating = false;
        });

        ['weight', 'other'].forEach(id => els[id].addEventListener('input', triggerForwardCalc));
        els.solveModeInputs.forEach(r => r.addEventListener('change', triggerForwardCalc));
        triggerForwardCalc();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').then(r => r.update()));
        }
    </script>
</body>
</html>
