<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jini Retail Calculator</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#064e3b">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="css/global.css">
    <script src="js/core/firebase-config.js"></script>
    <script src="js/core/security.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/modules/retail.js" defer></script>
</head>
<body class="bg-gradient-to-br from-[#064e3b] via-[#022c22] to-gray-900 font-sans text-gray-800 min-h-screen w-full flex flex-col selection:bg-[#D4AF37] selection:text-gray-900 scroll-unlocked">

    <div id="sessionLockOverlay" class="fixed inset-0 bg-black/95 backdrop-blur-2xl z-50 flex flex-col justify-center items-center text-center p-6 transition-all duration-300 hidden no-print">
        <h2 class="text-3xl font-black text-white tracking-tight mb-1">TERMINAL SECURED</h2>
        <p class="text-xs font-bold text-gray-400 tracking-widest uppercase mb-6">Jini Jewels Showroom Security Lock</p>
        <button type="button" onclick="unlockTerminalWithBiometrics()" class="w-full max-w-xs bg-[#047857] hover:bg-[#064e3b] text-white font-black py-4 px-4 rounded-2xl uppercase tracking-widest transition-colors shadow-md active:scale-95 flex items-center justify-center gap-2">
            <span>Verify Biometrics</span>
        </button>
    </div>

    <div class="flex-shrink-0 flex flex-col z-10 sticky top-0 bg-[#064e3b]/95 backdrop-blur-md shadow-md border-b border-white/10">
        <div class="flex items-center px-4 py-3 max-w-2xl mx-auto w-full">
            <a href="index.html" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center border border-white/20 active:scale-90 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
            </a>
            <h1 class="flex-1 text-center text-lg md:text-2xl font-black text-white tracking-widest uppercase mr-10">Jini Retail</h1>
        </div>
        
        <div class="bg-gray-900 text-emerald-400 text-[10px] md:text-xs font-bold tracking-widest py-1.5 overflow-hidden flex relative border-b border-[#D4AF37]">
            <div class="animate-marquee whitespace-nowrap flex space-x-10 px-4" id="ticker-container">
                <span id="tick-xau">GOLD: --</span><span id="tick-xag">SILV: --</span>
                <span id="tick-usd">USD: --</span><span id="tick-eur">EUR: --</span>
                <span id="tick-xau-2">GOLD: --</span><span id="tick-xag-2">SILV: --</span>
                <span id="tick-usd-2">USD: --</span><span id="tick-eur-2">EUR: --</span>
            </div>
        </div>
    </div>

    <div class="flex-1 px-4 md:px-8 pt-4 pb-48 max-w-2xl mx-auto w-full space-y-5">
        
        <div class="bg-white/95 backdrop-blur-lg rounded-[1.5rem] p-5 md:p-6 shadow-xl border border-white/20 mt-2">
            <h3 class="text-lg font-bold mb-4 text-[#064e3b]">Calculation Flow</h3>
            
            <div class="grid grid-cols-2 gap-4 md:gap-5">
                <div>
                    <label class="block text-[11px] md:text-sm font-black text-[#047857] mb-1.5 uppercase tracking-wide">Today's Rate</label>
                    <div class="bg-emerald-50 rounded-xl flex items-center px-4 py-3 focus-ring border border-emerald-200 transition-all">
                        <span class="text-emerald-700 font-bold text-xl md:text-2xl mr-2">₹</span>
                        <input type="number" id="dailySilverRate" class="w-full bg-transparent outline-none text-gray-900 font-black text-2xl md:text-3xl" placeholder="0" />
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] md:text-sm font-black text-gray-700 mb-1.5 uppercase tracking-wide">Labour (L-Val)</label>
                    <div class="bg-gray-50 rounded-xl flex items-center px-4 py-3 focus-ring border border-gray-200 transition-all">
                        <span class="text-gray-400 font-bold text-xl md:text-2xl mr-2">₹</span>
                        <input type="number" id="labourCharge" class="w-full bg-transparent outline-none text-gray-900 font-black text-2xl md:text-3xl text-center" placeholder="0" />
                    </div>
                </div>

                <div class="col-span-2 md:col-span-1">
                    <label class="block text-[11px] md:text-sm font-black text-gray-700 mb-1.5 uppercase tracking-wide">Weight (g)</label>
                    <div class="bg-gray-50 rounded-xl flex items-center px-4 py-3 focus-ring border border-gray-200 transition-all">
                        <input type="number" id="weight" class="w-full bg-transparent outline-none text-gray-900 font-black text-2xl md:text-3xl text-center tracking-widest" placeholder="0" />
                    </div>
                </div>

                <div class="col-span-2 md:col-span-1">
                    <label class="block text-[11px] md:text-sm font-black text-gray-700 mb-1.5 uppercase tracking-wide">Other (₹)</label>
                    <div class="bg-gray-50 rounded-xl flex items-center px-4 py-3 focus-ring border border-gray-200 transition-all">
                        <span class="text-gray-400 font-bold text-xl md:text-2xl mr-2">₹</span>
                        <input type="number" id="otherCharges" class="w-full bg-transparent outline-none text-gray-900 font-black text-2xl md:text-3xl text-center" placeholder="0" />
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white/95 backdrop-blur-lg rounded-[1.5rem] p-5 md:p-6 shadow-xl border border-white/20">
            <div class="grid grid-cols-3 gap-4 md:gap-5 mb-5">
                <div class="col-span-2">
                    <label class="block text-[11px] md:text-sm font-black text-gray-700 mb-1.5 uppercase tracking-widest text-center">Cypher Tag</label>
                    <div class="bg-stone-100 rounded-xl flex items-center px-4 py-3 focus-ring border-2 border-stone-200 transition-all shadow-inner h-[56px] md:h-[64px]">
                        <input type="text" id="cypherCode" class="w-full bg-transparent outline-none text-gray-900 font-black text-xl md:text-2xl text-center tracking-[0.2em] uppercase" placeholder="FRARXLAR" />
                    </div>
                </div>

                <div class="col-span-1 flex flex-col justify-end">
                    <label class="block text-[9px] md:text-xs font-bold text-gray-400 mb-1.5 uppercase tracking-wide text-center">Old Cost</label>
                    <div class="bg-gray-100 rounded-xl flex items-center px-2 py-3 border border-gray-200 opacity-70 h-[56px] md:h-[64px]">
                        <span class="text-gray-400 font-bold text-sm md:text-lg mx-auto">₹ <input type="number" id="itemSilverRate" class="w-10 md:w-14 bg-transparent border-none text-center outline-none pointer-events-none" placeholder="0" readonly /></span>
                    </div>
                </div>
            </div>

            <div class="bg-emerald-50 rounded-xl border border-emerald-100 flex items-center justify-between px-5 py-4">
                <span class="text-[10px] md:text-sm font-bold text-emerald-800/70 uppercase tracking-widest">Total Base</span>
                <span class="text-2xl md:text-3xl font-black text-[#047857]">₹ <span id="baseRateDisplay">0</span></span>
            </div>
        </div>

        <div class="bg-white/95 backdrop-blur-lg rounded-[1.5rem] p-5 md:p-6 shadow-xl border border-white/20">
            <div class="flex justify-between items-center px-2">
                <div class="flex items-center gap-3 md:gap-4">
                    <div class="relative inline-block w-10 md:w-12 h-5 md:h-6 align-middle select-none">
                        <input type="checkbox" id="hmToggle" class="toggle-checkbox absolute block w-5 md:w-6 h-5 md:h-6 rounded-full bg-white border-2 border-gray-300 appearance-none cursor-pointer z-10 transition-all" />
                        <label for="hmToggle" class="toggle-label block overflow-hidden h-5 md:h-6 rounded-full bg-gray-300 cursor-pointer transition-colors"></label>
                    </div>
                    <span class="text-[10px] md:text-sm font-extrabold text-gray-600 uppercase">HUID</span>
                    <input type="number" id="hmCharge" class="w-14 md:w-20 bg-gray-100 border border-gray-200 rounded-lg text-center text-xs md:text-sm font-bold py-1.5 md:py-2 outline-none focus-ring opacity-40 transition-opacity" placeholder="50" value="50" />
                </div>
                
                <div class="w-px h-8 bg-gray-200"></div>
                
                <div class="flex items-center gap-3 md:gap-4">
                    <div class="relative inline-block w-10 md:w-12 h-5 md:h-6 align-middle select-none">
                        <input type="checkbox" id="gstToggle" class="toggle-checkbox absolute block w-5 md:w-6 h-5 md:h-6 rounded-full bg-white border-2 border-gray-300 appearance-none cursor-pointer z-10 transition-all" />
                        <label for="gstToggle" class="toggle-label block overflow-hidden h-5 md:h-6 rounded-full bg-gray-300 cursor-pointer transition-colors"></label>
                    </div>
                    <span class="text-[10px] md:text-sm font-extrabold text-gray-600 uppercase opacity-40 transition-opacity" id="gstLabel">GST 3%</span>
                </div>
            </div>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 w-full bg-gray-950 border-t border-white/10 z-40">
        <div class="max-w-2xl mx-auto px-4 pt-3 pb-1">
            <div class="flex justify-between items-center mb-3">
                <span class="text-gray-400 text-[9px] md:text-xs font-bold uppercase tracking-widest hidden sm:block">When Total Changes:</span>
                <div class="flex space-x-2 bg-gray-900 rounded-lg p-1 border border-white/70 w-full sm:w-auto justify-center">
                    <input type="radio" id="solveLabour" name="solveMode" value="labour" class="solve-radio hidden" checked>
                    <label for="solveLabour" class="text-[10px] md:text-xs font-bold uppercase px-4 md:px-6 py-2 rounded-md cursor-pointer text-gray-400 transition-colors">Solve L-Val</label>
                    <input type="radio" id="solveF" name="solveMode" value="f_rate" class="solve-radio hidden">
                    <label for="solveF" class="text-[10px] md:text-xs font-bold uppercase px-4 md:px-6 py-2 rounded-md cursor-pointer text-gray-400 transition-colors">Solve Cost</label>
                </div>
            </div>

            <div class="flex justify-between items-center border-b border-white/5 pb-2">
                <span class="text-white text-xl md:text-2xl font-black uppercase tracking-widest">Total</span>
                <div class="relative w-2/3 flex justify-end items-center">
                    <span class="text-emerald-500 font-bold text-4xl md:text-5xl mr-2">₹</span>
                    <input type="number" id="grandTotal" class="w-full bg-transparent border-none py-1 text-5xl md:text-6xl font-black text-white text-right outline-none focus:ring-2 focus:ring-[#D4AF37] rounded transition-all" placeholder="0" />
                </div>
            </div>
        </div>

        <div class="grid grid-cols-4 text-center text-[10px] font-black uppercase tracking-wider text-gray-400 max-w-2xl mx-auto">
            <a href="retail.html" class="py-3.5 text-[#D4AF37] bg-white/10 border-r border-white/5 flex flex-col items-center justify-center gap-0.5"><span>✨</span><span class="scale-90">Retail</span></a>
            <a href="backoffice.html" class="py-3.5 hover:text-white border-r border-white/5 flex flex-col items-center justify-center gap-0.5"><span>💼</span><span class="scale-90">Office</span></a>
            <a href="inventory.html" class="py-3.5 hover:text-white border-r border-white/5 flex flex-col items-center justify-center gap-0.5"><span>📦</span><span class="scale-90">Stock</span></a>
            <a href="billing.html" class="py-3.5 hover:text-white flex flex-col items-center justify-center gap-0.5"><span>🧾</span><span class="scale-90">Billing</span></a>
        </div>
    </div>
</body>
</html>
