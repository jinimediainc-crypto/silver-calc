<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hide arrows on number inputs */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        /* Focus ring styling */
        .focus-ring:focus { border-color: #047857; box-shadow: 0 0 0 2px rgba(4, 120, 87, 0.2); }
        /* Custom toggle styling */
        .toggle-checkbox:checked { right: 0; border-color: #047857; }
        .toggle-checkbox:checked + .toggle-label { background-color: #047857; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen p-2 font-sans text-gray-800">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm overflow-hidden border border-gray-200">
        
        <div class="bg-[#047857] p-3 text-center border-b-2 border-[#D4AF37]">
            <h1 class="text-lg font-bold text-white tracking-widest uppercase">Calculator</h1>
        </div>

        <div class="p-4 space-y-4">
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-emerald-50 p-2 rounded-lg border border-emerald-100">
                    <label class="block text-[10px] font-bold text-emerald-800 uppercase mb-1">Global 'F'</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-emerald-600 text-sm font-bold">₹</span>
                        <input type="number" id="dailySilverRate" class="w-full bg-white border border-emerald-200 rounded-md py-1.5 pl-6 pr-2 text-sm font-bold outline-none focus-ring" placeholder="0" />
                    </div>
                </div>
                <div class="bg-blue-50 p-2 rounded-lg border border-blue-100">
                    <label class="block text-[10px] font-bold text-blue-800 uppercase mb-1">Item 'F'</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-blue-600 text-sm font-bold">₹</span>
                        <input type="number" id="itemSilverRate" class="w-full bg-white border border-blue-200 rounded-md py-1.5 pl-6 pr-2 text-sm font-bold outline-none focus-ring" placeholder="0" />
                    </div>
                </div>
            </div>

            <div class="bg-stone-50 p-3 rounded-xl border border-stone-200 shadow-inner">
                <div class="grid grid-cols-2 gap-3 mb-2">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Tag ID</label>
                        <input type="text" id="cypherCode" class="w-full bg-white border border-gray-300 rounded-lg p-2 text-center font-bold tracking-widest uppercase outline-none focus-ring" placeholder="e.g. FRSS" />
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">L-Val</label>
                        <input type="number" id="labourCharge" class="w-full bg-white border border-gray-300 rounded-lg p-2 text-center font-bold outline-none focus-ring" placeholder="0" />
                    </div>
                </div>
                
                <div class="flex justify-between items-center bg-gray-200/50 rounded-lg px-3 py-1.5">
                    <span class="text-xs font-bold text-gray-500 uppercase">Base:</span>
                    <span class="text-sm font-extrabold text-[#047857]">₹ <span id="baseRateDisplay">0</span></span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">Weight</label>
                    <input type="number" id="weight" class="w-full bg-white border border-gray-300 rounded-lg p-2 font-semibold outline-none focus-ring text-center" placeholder="0" />
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">Other</label>
                    <input type="number" id="otherCharges" class="w-full bg-white border border-gray-300 rounded-lg p-2 font-semibold outline-none focus-ring text-center" placeholder="0" />
                </div>
            </div>

            <div class="bg-gray-50 p-3 rounded-xl border border-gray-200 flex justify-between items-center gap-2">
                <div class="flex items-center gap-2">
                    <div class="relative inline-block w-8 h-4 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" id="hmToggle" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-2 border-gray-300 appearance-none cursor-pointer transition-all duration-300 z-10" />
                        <label for="hmToggle" class="toggle-label block overflow-hidden h-4 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300"></label>
                    </div>
                    <span class="text-[10px] font-bold text-gray-600 uppercase">HUID</span>
                    <input type="number" id="hmCharge" class="w-12 bg-white border border-gray-300 rounded text-center text-xs font-bold py-0.5 outline-none focus-ring transition-opacity" placeholder="50" value="50" style="opacity: 0.4;" />
                </div>

                <div class="flex items-center gap-2 border-l border-gray-300 pl-3">
                    <div class="relative inline-block w-8 h-4 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" id="gstToggle" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-2 border-gray-300 appearance-none cursor-pointer transition-all duration-300 z-10" />
                        <label for="gstToggle" class="toggle-label block overflow-hidden h-4 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300"></label>
                    </div>
                    <span class="text-[10px] font-bold text-gray-600 uppercase" id="gstLabel" style="opacity: 0.4;">GST 3%</span>
                </div>
            </div>

        </div>

        <div class="bg-gray-900 p-4 flex justify-between items-center border-t-4 border-[#D4AF37]">
            <div class="flex flex-col">
                <span class="text-gray-400 text-[11px] font-bold uppercase tracking-widest">Total</span>
            </div>
            <div class="relative w-2/3 flex justify-end">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-emerald-500 font-bold text-2xl">₹</span>
                <input type="number" id="grandTotal" class="w-full bg-transparent border-none rounded-lg py-1 pl-10 pr-2 text-3xl font-extrabold text-white text-right outline-none focus:ring-2 focus:ring-[#D4AF37] transition-all" placeholder="0" />
            </div>
        </div>

    </div>

    <script>
        // Mapping for SILVERBANK
        const decodeMap = { 's':'0', 'i':'1', 'l':'2', 'v':'3', 'e':'4', 'r':'5', 'b':'6', 'a':'7', 'n':'8', 'k':'9' };
        const encodeMap = { '0':'s', '1':'i', '2':'l', '3':'v', '4':'e', '5':'r', '6':'b', '7':'a', '8':'n', '9':'k' };

        // DOM Elements
        const els = {
            dailyRate: document.getElementById('dailySilverRate'),
            itemRate: document.getElementById('itemSilverRate'),
            code: document.getElementById('cypherCode'),
            labour: document.getElementById('labourCharge'),
            baseRateDisplay: document.getElementById('baseRateDisplay'),
            weight: document.getElementById('weight'),
            other: document.getElementById('otherCharges'),
            hmToggle: document.getElementById('hmToggle'),
            hmCharge: document.getElementById('hmCharge'),
            gstToggle: document.getElementById('gstToggle'),
            gstLabel: document.getElementById('gstLabel'),
            total: document.getElementById('grandTotal')
        };

        let isCalculating = false;

        // --- INIT & SYNC ---
        const savedRate = localStorage.getItem('retail_compact_silverRate') || '';
        els.dailyRate.value = savedRate;
        els.itemRate.value = savedRate; 
        
        // Load toggle states
        els.hmToggle.checked = localStorage.getItem('retail_hmToggle') === 'true';
        els.gstToggle.checked = localStorage.getItem('retail_gstToggle') === 'true';
        if (localStorage.getItem('retail_hmCharge')) els.hmCharge.value = localStorage.getItem('retail_hmCharge');
        
        updateToggleStyles();

        els.dailyRate.addEventListener('input', (e) => {
            const val = e.target.value;
            localStorage.setItem('retail_compact_silverRate', val);
            els.itemRate.value = val; 
            triggerForwardCalc();
        });
        
        els.itemRate.addEventListener('input', triggerForwardCalc);

        // Toggle Listeners
        els.hmToggle.addEventListener('change', (e) => {
            localStorage.setItem('retail_hmToggle', e.target.checked);
            updateToggleStyles();
            triggerForwardCalc();
        });
        els.hmCharge.addEventListener('input', (e) => {
            localStorage.setItem('retail_hmCharge', e.target.value);
            triggerForwardCalc();
        });
        els.gstToggle.addEventListener('change', (e) => {
            localStorage.setItem('retail_gstToggle', e.target.checked);
            updateToggleStyles();
            triggerForwardCalc();
        });

        function updateToggleStyles() {
            els.hmCharge.style.opacity = els.hmToggle.checked ? '1' : '0.4';
            els.gstLabel.style.opacity = els.gstToggle.checked ? '1' : '0.4';
        }

        // --- CORE LOGIC ---
        const getSilverRate = () => parseFloat(els.itemRate.value) || 0;

        const encodeNumber = (num) => {
            let str = Math.round(num).toString();
            let text = '';
            for (let char of str) {
                if (encodeMap[char] !== undefined) text += encodeMap[char];
            }
            return text.toUpperCase();
        };

        const decodeCypher = (text) => {
            let numStr = '';
            const lowerText = text.toLowerCase();
            let startIndex = lowerText.startsWith('f') ? 1 : 0; 
            for (let i = startIndex; i < lowerText.length; i++) {
                if (decodeMap[lowerText[i]] !== undefined) {
                    numStr += decodeMap[lowerText[i]];
                }
            }
            return parseInt(numStr) || 0;
        };

        const updateBaseRateDisplay = (labourVal) => {
            const silver = getSilverRate();
            const hasF = els.code.value.toLowerCase().startsWith('f') || (!els.code.value && labourVal > 0);
            
            let totalBase = 0;
            if (els.code.value || labourVal > 0) {
                totalBase = (hasF ? silver : 0) + labourVal;
            }
            
            els.baseRateDisplay.innerText = totalBase;
            return totalBase;
        };

        // --- CALCULATION WORKFLOWS ---

        function triggerForwardCalc() {
            if (isCalculating) return;
            isCalculating = true;

            const labour = parseFloat(els.labour.value) || 0;
            const baseRate = updateBaseRateDisplay(labour);
            const weight = parseFloat(els.weight.value) || 0;
            const other = parseFloat(els.other.value) || 0;
            const hm = els.hmToggle.checked ? (parseFloat(els.hmCharge.value) || 0) : 0;

            if (weight > 0 && baseRate > 0) {
                let subTotal = (baseRate * weight) + other + hm;
                let finalTotal = els.gstToggle.checked ? (subTotal * 1.03) : subTotal;
                els.total.value = Math.round(finalTotal);
            } else {
                els.total.value = ''; 
            }

            isCalculating = false;
        }

        els.code.addEventListener('input', () => {
            if (isCalculating) return;
            isCalculating = true;
            const decodedLabour = decodeCypher(els.code.value);
            els.labour.value = decodedLabour || '';
            isCalculating = false;
            triggerForwardCalc();
        });

        els.labour.addEventListener('input', () => {
            if (isCalculating) return;
            isCalculating = true;
            const labourVal = parseFloat(els.labour.value) || 0;
            if (labourVal > 0) {
                els.code.value = 'F' + encodeNumber(labourVal);
            } else {
                els.code.value = '';
            }
            isCalculating = false;
            triggerForwardCalc();
        });

        // Reverse calculation (from Total -> Labour & Code)
        els.total.addEventListener('input', () => {
            if (isCalculating) return;
            isCalculating = true;

            const total = parseFloat(els.total.value) || 0;
            const weight = parseFloat(els.weight.value) || 0;
            const other = parseFloat(els.other.value) || 0;
            const silver = getSilverRate();
            const hm = els.hmToggle.checked ? (parseFloat(els.hmCharge.value) || 0) : 0;

            if (weight > 0 && total > 0) {
                // Strip GST if applied
                let targetSubTotal = els.gstToggle.checked ? (total / 1.03) : total;
                
                // Subtract Other and Hallmark, then divide by weight to find Base
                let requiredBaseRate = (targetSubTotal - other - hm) / weight;
                let requiredLabour = Math.max(0, requiredBaseRate - silver); 
                
                // Update Inputs
                els.labour.value = Math.round(requiredLabour);
                els.code.value = 'F' + encodeNumber(requiredLabour);
                
                updateBaseRateDisplay(requiredLabour);
            }

            isCalculating = false;
        });

        els.weight.addEventListener('input', triggerForwardCalc);
        els.other.addEventListener('input', triggerForwardCalc);

        triggerForwardCalc();

    </script>
</body>
</html>
