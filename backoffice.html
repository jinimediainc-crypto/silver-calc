<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jini Back Office</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#064e3b">
    <link rel="apple-touch-icon" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="./css/global.css">
    <script src="./js/core/firebase-config.js"></script>
    <script src="./js/core/security.js"></script>
    <script src="./js/modules/backoffice.js" defer></script>
</head>
<body class="bg-gradient-to-br from-[#064e3b] via-[#022c22] to-gray-900 font-sans text-gray-800 min-h-screen w-full flex flex-col selection:bg-[#D4AF37] selection:text-gray-900 scroll-unlocked">

    <div id="sessionLockOverlay" class="fixed inset-0 bg-black/95 backdrop-blur-2xl z-50 flex flex-col justify-center items-center text-center p-6 transition-all duration-300 hidden no-print">
        <h2 class="text-3xl font-black text-white tracking-tight mb-1">TERMINAL SECURED</h2>
        <button type="button" onclick="if(typeof window.unlockTerminalWithBiometrics === 'function') window.unlockTerminalWithBiometrics()" class="w-full max-w-xs bg-[#047857] hover:bg-[#064e3b] text-white font-black py-4 px-4 rounded-2xl uppercase tracking-widest transition-colors shadow-md active:scale-95">Verify Biometrics</button>
    </div>

    <div class="flex-shrink-0 bg-[#064e3b]/95 backdrop-blur-md shadow-md border-b border-white/10 no-print z-10 sticky top-0">
        <div class="flex items-center px-4 py-4 max-w-2xl mx-auto w-full">
            <a href="index.html" class="w-10 h-10 bg-white/10 rounded-full flex items-center justify-center border border-white/20 active:scale-90 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
            </a>
            <h1 class="flex-1 text-center text-lg md:text-xl font-black text-white tracking-widest uppercase mr-10">Back Office</h1>
        </div>
    </div>

    <div class="flex-1 w-full max-w-2xl mx-auto px-4 md:px-8 pt-6 pb-48 space-y-5 no-print">
        
        <div class="mt-2 mb-6">
            <span class="text-[#D4AF37] text-[10px] md:text-xs font-bold tracking-widest uppercase">Secure Terminal</span>
            <h2 class="text-3xl md:text-4xl font-extrabold text-white mt-1 mb-2 tracking-tight">Internal Calc</h2>
        </div>
        
        <div class="bg-white/95 backdrop-blur-lg rounded-[1.5rem] p-5 shadow-xl mb-5 border border-white/20">
            <h3 class="text-lg font-bold mb-4 text-[#064e3b]">Base Values</h3>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[11px] font-black text-[#047857] mb-1.5 uppercase tracking-wide">Silver Rate (₹/g)</label>
                    <div class="bg-emerald-50 rounded-xl flex items-center px-4 py-3 focus-ring border border-emerald-200 transition-all">
                        <span class="text-emerald-700 font-bold text-xl mr-2">₹</span>
                        <input type="number" id="boSilverRate" class="w-full bg-transparent outline-none text-gray-900 font-black text-2xl" placeholder="0" />
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-black text-gray-700 mb-1.5 uppercase tracking-wide">Labour Charge (₹/g)</label>
                    <div class="bg-gray-50 rounded-xl flex items-center px-4 py-3 focus-ring border border-gray-200 transition-all">
                        <span class="text-gray-400 font-bold text-xl mr-2">₹</span>
                        <input type="number" id="boLabour" class="w-full bg-transparent outline-none text-gray-900 font-bold text-xl text-center" placeholder="0" />
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white/95 backdrop-blur-lg rounded-[1.5rem] p-5 shadow-xl mb-5 border border-white/20">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="text-lg font-bold text-[#064e3b]">Weight</h3>
                    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-wide">Total grams</span>
                </div>
                <div class="bg-gray-50 rounded-xl flex items-center px-3 py-3 focus-ring border border-gray-200 transition-all w-32 md:w-40">
                    <input type="number" id="boWeight" class="w-full bg-transparent outline-none text-gray-900 font-black text-xl text-center" placeholder="0" />
                </div>
            </div>
        </div>

        <div class="bg-white/95 backdrop-blur-lg rounded-[1.5rem] p-5 shadow-xl border border-white/20 mb-5">
            <h3 class="text-lg font-bold mb-4 text-[#064e3b]">Modifiers</h3>
            <div class="flex justify-between items-center px-2 mb-4">
                <div class="flex items-center gap-3">
                    <div class="relative inline-block w-10 h-5 align-middle select-none">
                        <input type="checkbox" id="boGstToggle" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-2 border-gray-300 appearance-none cursor-pointer z-10 transition-all" checked />
                        <label for="boGstToggle" class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer transition-colors"></label>
                    </div>
                    <span class="text-[11px] font-extrabold text-gray-700 uppercase tracking-wide">Apply GST (3%)</span>
                </div>
            </div>
            <hr class="border-gray-100 mb-4">
            <div class="flex justify-between items-center px-2">
                <div class="flex items-center gap-3">
                    <div class="relative inline-block w-10 h-5 align-middle select-none">
                        <input type="checkbox" id="boCommToggle" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-2 border-gray-300 appearance-none cursor-pointer z-10 transition-all" checked />
                        <label for="boCommToggle" class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer transition-colors"></label>
                    </div>
                    <span class="text-[11px] font-extrabold text-gray-700 uppercase tracking-wide">Commission</span>
                </div>
                <div class="flex items-center bg-gray-50 border border-gray-200 rounded-lg overflow-hidden focus-within:border-[#D4AF37] transition-all">
                    <input type="number" id="boCommPercent" class="w-16 text-center text-sm font-bold py-1.5 outline-none bg-transparent" value="10" />
                    <span class="bg-gray-200/60 text-gray-500 font-bold px-3 py-1.5 text-sm border-l border-gray-200">%</span>
                </div>
            </div>
        </div>

        <div class="bg-white/95 backdrop-blur-lg rounded-[1.5rem] p-5 shadow-xl border border-white/20 mb-5">
            <h3 class="text-sm font-bold mb-3 text-gray-400 uppercase tracking-widest text-center">Receipt Breakdown</h3>
            <div class="bg-emerald-50/50 rounded-xl p-4 border border-emerald-100/50">
                <div class="space-y-2.5 text-xs md:text-sm font-bold text-gray-600">
                    <div class="flex justify-between"><span>Silver Value</span><span class="text-gray-900">₹ <span id="valSilver">0</span></span></div>
                    <div class="flex justify-between"><span>Labour Value</span><span class="text-gray-900">₹ <span id="valLabour">0</span></span></div>
                    <div class="flex justify-between text-emerald-700 hidden" id="rowGst"><span>GST (3%)</span><span>₹ <span id="valGst">0</span></span></div>
                    <div class="flex justify-between text-blue-700 hidden" id="rowComm"><span id="lblComm">Commission (10%)</span><span>₹ <span id="valComm">0</span></span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-gray-950 border-t border-white/10 z-40 no-print" id="bottomNavbarMenu">
        <div class="bg-gray-900/90 border-b border-white/5 px-6 py-4 flex justify-between items-center text-left">
            <span class="text-white text-xl md:text-2xl font-black uppercase tracking-widest">Total</span>
            <div class="flex items-center text-emerald-500 font-black text-3xl">
                <span class="mr-1 text-2xl">₹</span>
                <span id="boGrandTotal" class="text-white font-black text-4xl md:text-5xl">0</span>
            </div>
        </div>
        <div class="flex overflow-x-auto no-scrollbar max-w-4xl mx-auto w-full px-2">
            <a href="retail.html" class="flex-shrink-0 w-[65px] py-3.5 hover:text-white flex flex-col items-center justify-center gap-0.5 text-[9px] font-black uppercase tracking-wider text-gray-400"><span class="text-base">✨</span><span>Retail</span></a>
            <a href="backoffice.html" class="flex-shrink-0 w-[65px] py-3.5 text-[#D4AF37] bg-white/10 flex flex-col items-center justify-center gap-0.5 text-[9px] font-black uppercase tracking-wider rounded-lg my-0.5"><span class="text-base">💼</span><span>Office</span></a>
            <a href="inventory.html" class="flex-shrink-0 w-[65px] py-3.5 hover:text-white flex flex-col items-center justify-center gap-0.5 text-[9px] font-black uppercase tracking-wider text-gray-400"><span class="text-base">📦</span><span>Stock</span></a>
            <a href="billing.html" class="flex-shrink-0 w-[65px] py-3.5 hover:text-white flex flex-col items-center justify-center gap-0.5 text-[9px] font-black uppercase tracking-wider text-gray-400"><span class="text-base">🧾</span><span>Billing</span></a>
            <a href="accounting.html" class="flex-shrink-0 w-[65px] py-3.5 hover:text-white flex flex-col items-center justify-center gap-0.5 text-[9px] font-black uppercase tracking-wider text-gray-400"><span class="text-base">📓</span><span>Account</span></a>
            <a href="crm.html" class="flex-shrink-0 w-[65px] py-3.5 hover:text-white flex flex-col items-center justify-center gap-0.5 text-[9px] font-black uppercase tracking-wider text-gray-400"><span class="text-base">🤝</span><span>CRM</span></a>
            <a href="hisab.html" class="flex-shrink-0 w-[65px] py-3.5 hover:text-white flex flex-col items-center justify-center gap-0.5 text-[9px] font-black uppercase tracking-wider text-gray-400"><span class="text-base">⚖️</span><span>Hisab</span></a>
            <a href="admin.html" class="flex-shrink-0 w-[65px] py-3.5 hover:text-white flex flex-col items-center justify-center gap-0.5 text-[9px] font-black uppercase tracking-wider text-gray-400"><span class="text-base">🛡️</span><span>Admin</span></a>
        </div>
    </div>
</body>
</html>
