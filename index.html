<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Silver Calc PWA</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#10b981">
  <style>
    :root {
      --primary: #10b981;
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #1f2937;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .container {
      background: var(--card);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }
    h2 {
      margin-top: 0;
      text-align: center;
      color: var(--primary);
    }
    .input-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      color: #4b5563;
    }
    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 16px 0;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      font-size: 24px;
      color: var(--primary);
    }
    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
      display: block;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Silver Pricing</h2>
    
    <div class="input-group">
      <label for="rate">Today's Silver Rate (₹ per 1 kg)</label>
      <input type="number" id="rate" placeholder="e.g., 85000" inputmode="decimal">
      <span class="hint">Saved automatically. Only change when market changes.</span>
    </div>

    <div class="input-group">
      <label for="grams">Weight (Grams)</label>
      <input type="number" id="grams" placeholder="Enter grams" inputmode="decimal">
    </div>

    <div class="input-group">
      <label for="labour">Labour Charge (₹)</label>
      <input type="number" id="labour" placeholder="Enter labour cost" inputmode="decimal">
    </div>

    <div class="divider"></div>

    <div class="row">
      <span>Silver Value</span>
      <span id="silverOut">₹ 0.00</span>
    </div>
    <div class="row">
      <span>GST (3% on Silver+Labour)</span>
      <span id="gstOut">₹ 0.00</span>
    </div>
    <div class="row">
      <span>Comm. (10% on Sil+Lab+GST)</span>
      <span id="commOut">₹ 0.00</span>
    </div>

    <div class="divider"></div>

    <div class="total-row">
      <span>Total</span>
      <span id="totalOut">₹ 0.00</span>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    const rateInput = document.getElementById('rate');
    const gramsInput = document.getElementById('grams');
    const labourInput = document.getElementById('labour');
    
    const silverOut = document.getElementById('silverOut');
    const gstOut = document.getElementById('gstOut');
    const commOut = document.getElementById('commOut');
    const totalOut = document.getElementById('totalOut');

    // Load saved silver rate per kg on startup
    const savedRate = localStorage.getItem('savedSilverRateKG');
    if (savedRate) {
      rateInput.value = savedRate;
    }

    function calculate() {
      const rate = parseFloat(rateInput.value) || 0;
      const grams = parseFloat(gramsInput.value) || 0;
      const labour = parseFloat(labourInput.value) || 0;

      // Save rate to local storage automatically
      localStorage.setItem('savedSilverRateKG', rate);

      // Math Logic
      const silverCost = (rate / 1000) * grams;
      const base = silverCost + labour;
      const gst = base * 0.03; 
      
      // Subtotal is Silver + Labour + GST
      const subtotal = base + gst;
      
      // Commission is 10% on the subtotal
      const comm = subtotal * 0.10; 
      
      const total = subtotal + comm;

      // Update UI
      silverOut.textContent = `₹ ${silverCost.toFixed(2)}`;
      gstOut.textContent = `₹ ${gst.toFixed(2)}`;
      commOut.textContent = `₹ ${comm.toFixed(2)}`;
      totalOut.textContent = `₹ ${total.toFixed(2)}`;
    }

    // Recalculate instantly as user types
    rateInput.addEventListener('input', calculate);
    gramsInput.addEventListener('input', calculate);
    labourInput.addEventListener('input', calculate);

    calculate();
  </script>
</body>
</html>
