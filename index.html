<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jini Jewels Hub</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#064e3b">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
        .shake-err { animation: shake 0.4s ease-in-out; }
        .pin-dot { transition: all 0.3s ease; }
        .pin-dot.filled { background-color: #D4AF37; border-color: #D4AF37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.6); transform: scale(1.2); }
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-[#fcfaf8] flex flex-col justify-center items-center min-h-[100dvh] font-sans text-gray-900 p-4 overflow-hidden relative">

    <div class="w-full max-w-sm md:max-w-md text-center mb-8 transition-opacity duration-300" id="mainMenu">
        <h1 class="text-4xl md:text-5xl font-black text-[#064e3b] tracking-tight mb-2">Jini Jewels</h1>
        <p class="text-xs md:text-sm font-bold text-gray-400 tracking-widest uppercase">Showroom Management System</p>
    </div>

    <div class="w-full max-w-sm md:max-w-md flex flex-col gap-4 transition-opacity duration-300" id="menuButtons">
        
        <button type="button" id="installAppBtn" class="hidden bg-[#064e3b] border-2 border-[#047857] rounded-2xl p-4 shadow-xl flex items-center justify-center text-center text-white hover:bg-emerald-800 transition-all active:scale-95">
            <span class="font-bold text-sm uppercase tracking-widest text-[#D4AF37]">📲 Install Showroom App</span>
        </button>

        <button type="button" onclick="openLock('retail.html')" class="w-full bg-white border-2 border-[#047857] rounded-2xl p-5 md:p-6 shadow-md flex items-center justify-center text-center hover:bg-emerald-50/50 transition-all active:scale-[0.98]">
            <span class="font-black text-[#064e3b] text-base md:text-lg uppercase tracking-widest">Retail Calculator</span>
        </button>
        
        <button type="button" onclick="openLock('backoffice.html')" class="w-full bg-white border border-gray-200 rounded-2xl p-5 md:p-6 shadow-sm flex items-center justify-center text-center hover:border-[#047857] transition-all active:scale-[0.98]">
            <span class="font-black text-[#064e3b] text-base md:text-lg uppercase tracking-widest">Back Office Calculator</span>
        </button>

        <button type="button" onclick="openLock('billing.html')" class="w-full bg-white border border-gray-200 rounded-2xl p-5 md:p-6 shadow-sm flex items-center justify-center text-center hover:border-[#047857] transition-all active:scale-[0.98]">
            <span class="font-black text-[#064e3b] text-base md:text-lg uppercase tracking-widest">POS & Billing</span>
        </button>
    </div>

    <div id="pinOverlay" class="fixed inset-0 bg-[#022c22]/95 backdrop-blur-xl z-50 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-all duration-300">
        
        <button type="button" onclick="closeLock()" class="absolute top-6 right-6 p-3 text-white/40 hover:text-white rounded-full bg-white/5 active:scale-90 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>

        <div class="mb-8 text-center" id="pinHeader">
            <h2 class="text-[#D4AF37] text-xs tracking-[0.4em] font-bold mb-6 uppercase">Secure Access</h2>
            
            <div class="flex justify-center gap-5 mb-4">
                <div class="pin-dot w-3.5 h-3.5 rounded-full border-2 border-[#D4AF37]/30" id="dot1"></div>
                <div class="pin-dot w-3.5 h-3.5 rounded-full border-2 border-[#D4AF37]/30" id="dot2"></div>
                <div class="pin-dot w-3.5 h-3.5 rounded-full border-2 border-[#D4AF37]/30" id="dot3"></div>
                <div class="pin-dot w-3.5 h-3.5 rounded-full border-2 border-[#D4AF37]/30" id="dot4"></div>
            </div>
            <p id="pinMsg" class="text-white/60 text-[10px] font-bold h-4 uppercase tracking-widest mt-4">Enter Passcode</p>
        </div>

        <div class="grid grid-cols-3 gap-x-5 gap-y-4 w-full max-w-[270px] md:max-w-sm px-4">
            <button type="button" onclick="addPin(1)" class="w-16 h-16 rounded-full border border-white/10 bg-white/5 text-white text-2xl font-light hover:bg-white/10 active:bg-[#D4AF37] active:text-gray-900 active:scale-95 transition-all mx-auto">1</button>
            <button type="button" onclick="addPin(2)" class="w-16 h-16 rounded-full border border-white/10 bg-white/5 text-white text-2xl font-light hover:bg-white/10 active:bg-[#D4AF37] active:text-gray-900 active:scale-95 transition-all mx-auto">2</button>
            <button type="button" onclick="addPin(3)" class="w-16 h-16 rounded-full border border-white/10 bg-white/5 text-white text-2xl font-light hover:bg-white/10 active:bg-[#D4AF37] active:text-gray-900 active:scale-95 transition-all mx-auto">3</button>
            
            <button type="button" onclick="addPin(4)" class="w-16 h-16 rounded-full border border-white/10 bg-white/5 text-white text-2xl font-light hover:bg-white/10 active:bg-[#D4AF37] active:text-gray-900 active:scale-95 transition-all mx-auto">4</button>
            <button type="button" onclick="addPin(5)" class="w-16 h-16 rounded-full border border-white/10 bg-white/5 text-white text-2xl font-light hover:bg-white/10 active:bg-[#D4AF37] active:text-gray-900 active:scale-95 transition-all mx-auto">5</button>
            <button type="button" onclick="addPin(6)" class="w-16 h-16 rounded-full border border-white/10 bg-white/5 text-white text-2xl font-light hover:bg-white/10 active:bg-[#D4AF37] active:text-gray-900 active:scale-95 transition-all mx-auto">6</button>
            
            <button type="button" onclick="addPin(7)" class="w-16 h-16 rounded-full border border-white/10 bg-white/5 text-white text-2xl font-light hover:bg-white/10 active:bg-[#D4AF37] active:text-gray-900 active:scale-95 transition-all mx-auto">7</button>
            <button type="button" onclick="addPin(8)" class="w-16 h-16 rounded-full border border-white/10 bg-white/5 text-white text-2xl font-light hover:bg-white/10 active:bg-[#D4AF37] active:text-gray-900 active:scale-95 transition-all mx-auto">8</button>
            <button type="button" onclick="addPin(9)" class="w-16 h-16 rounded-full border border-white/10 bg-white/5 text-white text-2xl font-light hover:bg-white/10 active:bg-[#D4AF37] active:text-gray-900 active:scale-95 transition-all mx-auto">9</button>
            
            <div></div> 
            <button type="button" onclick="addPin(0)" class="w-16 h-16 rounded-full border border-white/10 bg-white/5 text-white text-2xl font-light hover:bg-white/10 active:bg-[#D4AF37] active:text-gray-900 active:scale-95 transition-all mx-auto">0</button>
            
            <button type="button" onclick="delPin()" class="w-16 h-16 rounded-full text-white/40 hover:text-white active:scale-90 transition-all mx-auto flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z" /></svg>
            </button>
        </div>
    </div>

    <script>
        const MASTER_PIN = "1008"; 
        let currentPin = "", pendingUrl = "";
        const overlay = document.getElementById('pinOverlay'), header = document.getElementById('pinHeader'), msg = document.getElementById('pinMsg');

        // Check active session parameter validation
        if(sessionStorage.getItem('jini_auth') === 'true') {
            document.querySelector('p.text-gray-400').innerHTML = '<span class="text-emerald-700 font-bold">🔓 SECURE STATION UNLOCKED</span>';
        }

        function openLock(url) {
            if(sessionStorage.getItem('jini_auth') === 'true') { window.location.href = url; return; }
            pendingUrl = url; currentPin = ""; updateDots(); 
            msg.innerText = "ENTER PASSCODE";
            msg.className = "text-white/60 text-[10px] font-bold h-4 uppercase tracking-widest mt-4";
            overlay.classList.remove('opacity-0', 'pointer-events-none');
        }

        function closeLock() { overlay.classList.add('opacity-0', 'pointer-events-none'); pendingUrl = ""; currentPin = ""; }

        function addPin(num) {
            if(currentPin.length < 4) {
                currentPin += num; updateDots();
                if(currentPin.length === 4) setTimeout(verifyPin, 150);
            }
        }

        function delPin() {
            if(currentPin.length > 0) { 
                currentPin = currentPin.slice(0, -1); 
                updateDots(); 
                msg.innerText = "ENTER PASSCODE"; 
                msg.className = "text-white/60 text-[10px] font-bold h-4 uppercase tracking-widest mt-4"; 
            }
        }

        function updateDots() {
            for(let i=1; i<=4; i++) {
                const dot = document.getElementById('dot'+i);
                if(i <= currentPin.length) dot.classList.add('filled');
                else dot.classList.remove('filled');
            }
        }

        function verifyPin() {
            if(currentPin === MASTER_PIN) {
                sessionStorage.setItem('jini_auth', 'true');
                msg.className = "text-[#D4AF37] text-[10px] font-bold h-4 uppercase tracking-widest mt-4";
                msg.innerText = "ACCESS GRANTED";
                setTimeout(() => window.location.href = pendingUrl, 300);
            } else {
                msg.className = "text-red-400 text-[10px] font-bold h-4 uppercase tracking-widest mt-4";
                msg.innerText = "INCORRECT PIN";
                header.classList.add('shake-err');
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                setTimeout(() => { 
                    header.classList.remove('shake-err'); 
                    currentPin = ""; 
                    updateDots(); 
                    msg.innerText = "ENTER PASSCODE"; 
                    msg.className = "text-white/60 text-[10px] font-bold h-4 uppercase tracking-widest mt-4"; 
                }, 400);
            }
        }

        // PWA installer asset registration handling
        let deferredPrompt; const installBtn = document.getElementById('installAppBtn');
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; installBtn.classList.remove('hidden'); });
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) { deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; if (outcome === 'accepted') installBtn.classList.add('hidden'); deferredPrompt = null; }
        });
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').then(r => r.update())); }
    </script>
</body>
</html>
