<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Back Office Calc</title>
    <link rel="manifest" href="manifest-index.json">
    <meta name="theme-color" content="#047857">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .focus-ring:focus { border-color: #047857; box-shadow: 0 0 0 2px rgba(4, 120, 87, 0.2); }
        .toggle-checkbox:checked { right: 0; border-color: #047857; }
        .toggle-checkbox:checked + .toggle-label { background-color: #047857; }
    </style>
</head>
<body class="bg-gray-100 flex justify-center items-center h-[100dvh] p-2 font-sans text-gray-800 overflow-hidden">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm h-full max-h-[750px] flex flex-col border border-gray-200 overflow-hidden">
        
        <div class="bg-[#047857] p-3 text-center border-b-2 border-[#D4AF37]">
            <h1 class="text-lg font-bold text-white tracking-widest uppercase">Silver Calculator</h1>
        </div>

        <div class="p-4 flex-1 flex flex-col justify-evenly space-y-2">
            
            <div class="space-y-3">
                <div class="bg-gray-50 p-2 rounded-lg border border-gray-200">
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Silver Rate (₹ per Gram)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500 font-bold">₹</span>
                        <input type="number" id="silverRate" class="w-full bg-white border border-gray-300 rounded-lg py-2 pl-8 pr-2 text-sm font-bold outline-none focus-ring" placeholder="0.00" />
                    </div>
                </div>

                <div class="bg-gray-50 p-2 rounded-lg border border-gray-200">
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Weight (Grams)</label>
                    <input type="number" id="weight" class="w-full bg-white border border-gray-300 rounded-lg py-2 px-3 text-sm font-bold outline-none focus-ring" placeholder="Enter total weight" />
                </div>

                <div class="bg-gray-50 p-2 rounded-lg border border-gray-200">
                    <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Labour Charge (₹ per Gram)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500 font-bold">₹</span>
                        <input type="number" id="labour" class="w-full bg-white border border-gray-300 rounded-lg py-2 pl-8 pr-2 text-sm font-bold outline-none focus-ring" placeholder="0.00" />
                    </div>
                </div>
            </div>

            <div class="bg-gray-50 p-3 rounded-xl border border-gray-200 space-y-3">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-gray-700">Apply GST (3%)</span>
                    <div class="relative inline-block w-10 h-5 align-middle select-none">
                        <input type="checkbox" id="gstToggle" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-2 border-gray-300 appearance-none cursor-pointer transition-all duration-300 z-10" checked/>
                        <label for="gstToggle" class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300"></label>
                    </div>
                </div>
                
                <div class="flex justify-between items-center border-t border-gray-200 pt-3">
                    <div class="flex items-center gap-2">
                        <div class="relative inline-block w-10 h-5 align-middle select-none">
                            <input type="checkbox" id="commToggle" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-2 border-gray-300 appearance-none cursor-pointer transition-all duration-300 z-10" />
                            <label for="commToggle" class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300"></label>
                        </div>
                        <span class="text-xs font-bold text-gray-700">Commission</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <input type="number" id="commPercent" class="w-14 bg-white border border-gray-300 rounded-lg p-1 text-center text-sm font-bold outline-none focus-ring" value="10" />
                        <span class="text-xs font-bold text-gray-500">%</span>
                    </div>
                </div>
            </div>

            <div class="bg-stone-50 p-3 rounded-xl border border-stone-200 shadow-inner space-y-1.5 text-xs font-semibold text-gray-500">
                <div class="flex justify-between"><span>Silver Value</span><span id="outSilver" class="text-gray-800">₹ 0</span></div>
                <div class="flex justify-between"><span>Labour Value</span><span id="outLabour" class="text-gray-800">₹ 0</span></div>
                <div class="flex justify-between"><span>GST (3%)</span><span id="outGst" class="text-gray-800">₹ 0</span></div>
                <div class="flex justify-between"><span>Commission</span><span id="outComm" class="text-gray-800">₹ 0</span></div>
            </div>

        </div>

        <div class="bg-gray-900 p-4 flex justify-between items-center border-t-4 border-[#D4AF37]">
            <span class="text-white text-sm font-bold uppercase tracking-widest">Total</span>
            <span class="text-3xl font-extrabold text-emerald-400">₹ <span id="grandTotal">0</span></span>
        </div>

    </div>

    <script>
        const els = {
            rate: document.getElementById('silverRate'),
            weight: document.getElementById('weight'),
            labour: document.getElementById('labour'),
            gstToggle: document.getElementById('gstToggle'),
            commToggle: document.getElementById('commToggle'),
            commPercent: document.getElementById('commPercent'),
            outSilver: document.getElementById('outSilver'),
            outLabour: document.getElementById('outLabour'),
            outGst: document.getElementById('outGst'),
            outComm: document.getElementById('outComm'),
            total: document.getElementById('grandTotal')
        };

        // Load saved settings
        els.rate.value = localStorage.getItem('index_rate') || '';
        els.gstToggle.checked = localStorage.getItem('index_gst') !== 'false';
        els.commToggle.checked = localStorage.getItem('index_comm') === 'true';
        if (localStorage.getItem('index_comm_val')) els.commPercent.value = localStorage.getItem('index_comm_val');

        function calculate() {
            const rate = parseFloat(els.rate.value) || 0;
            const weight = parseFloat(els.weight.value) || 0;
            const labour = parseFloat(els.labour.value) || 0;
            const commPercent = parseFloat(els.commPercent.value) || 0;

            const silverVal = rate * weight;
            const labourVal = labour * weight;
            const subtotal = silverVal + labourVal;

            let commVal = 0;
            if (els.commToggle.checked) {
                commVal = subtotal * (commPercent / 100);
            }

            let gstVal = 0;
            if (els.gstToggle.checked) {
                gstVal = (subtotal + commVal) * 0.03;
            }

            const grandTotal = subtotal + commVal + gstVal;

            els.outSilver.innerText = `₹ ${Math.round(silverVal)}`;
            els.outLabour.innerText = `₹ ${Math.round(labourVal)}`;
            els.outComm.innerText = `₹ ${Math.round(commVal)}`;
            els.outGst.innerText = `₹ ${Math.round(gstVal)}`;
            els.total.innerText = Math.round(grandTotal);

            // Save state
            localStorage.setItem('index_rate', els.rate.value);
            localStorage.setItem('index_gst', els.gstToggle.checked);
            localStorage.setItem('index_comm', els.commToggle.checked);
            localStorage.setItem('index_comm_val', els.commPercent.value);
        }

        ['input', 'change'].forEach(evt => {
            els.rate.addEventListener(evt, calculate);
            els.weight.addEventListener(evt, calculate);
            els.labour.addEventListener(evt, calculate);
            els.gstToggle.addEventListener(evt, calculate);
            els.commToggle.addEventListener(evt, calculate);
            els.commPercent.addEventListener(evt, calculate);
        });

        // PWA Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => reg.update());
            });
        }
    </script>
</body>
</html>
