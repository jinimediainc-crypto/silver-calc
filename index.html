<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Silver Calc PWA</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#10b981">
  <style>
    :root {
      --primary: #10b981;
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #1f2937;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }
    .container {
      background: var(--card);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }
    h2 {
      margin-top: 0;
      text-align: center;
      color: var(--primary);
    }
    .input-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      color: #4b5563;
    }
    .divider {
      height: 1px;
      background: #e5e7eb;
      margin: 16px 0;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      font-size: 24px;
      color: var(--primary);
    }
    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
      display: block;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Silver Pricing</h2>
    
    <div class="input-group">
      <label for="silver">Fine Silver Value (₹)</label>
      <input type="number" id="silver" placeholder="Enter silver amount" inputmode="decimal">
      <span class="hint">Saved automatically. Change only when rate changes.</span>
    </div>

    <div class="input-group">
      <label for="labour">Labour Charge (₹)</label>
      <input type="number" id="labour" placeholder="Enter labour cost" inputmode="decimal">
    </div>

    <div class="divider"></div>

    <div class="row">
      <span>Base (Silver + Labour)</span>
      <span id="baseOut">₹ 0.00</span>
    </div>
    <div class="row">
      <span>Commission (10%)</span>
      <span id="commOut">₹ 0.00</span>
    </div>
    <div class="row">
      <span>GST (3%)</span>
      <span id="gstOut">₹ 0.00</span>
    </div>

    <div class="divider"></div>

    <div class="total-row">
      <span>Total</span>
      <span id="totalOut">₹ 0.00</span>
    </div>
  </div>

  <script>
    // Register Service Worker for PWA installability
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    const silverInput = document.getElementById('silver');
    const labourInput = document.getElementById('labour');
    
    const baseOut = document.getElementById('baseOut');
    const commOut = document.getElementById('commOut');
    const gstOut = document.getElementById('gstOut');
    const totalOut = document.getElementById('totalOut');

    // Load saved silver rate on startup
    const savedSilver = localStorage.getItem('savedSilverRate');
    if (savedSilver) {
      silverInput.value = savedSilver;
    }

    function calculate() {
      const silver = parseFloat(silverInput.value) || 0;
      const labour = parseFloat(labourInput.value) || 0;

      // Save silver rate to local storage whenever it changes
      localStorage.setItem('savedSilverRate', silver);

      // Math Logic
      const base = silver + labour;
      const comm = base * 0.10; 
      
      // Assuming GST is applied on the total (Base + Commission)
      // If GST is only on Base, change to: const gst = base * 0.03;
      const taxableAmount = base + comm;
      const gst = taxableAmount * 0.03; 
      
      const total = base + comm + gst;

      // Update UI
      baseOut.textContent = `₹ ${base.toFixed(2)}`;
      commOut.textContent = `₹ ${comm.toFixed(2)}`;
      gstOut.textContent = `₹ ${gst.toFixed(2)}`;
      totalOut.textContent = `₹ ${total.toFixed(2)}`;
    }

    // Recalculate instantly as user types
    silverInput.addEventListener('input', calculate);
    labourInput.addEventListener('input', calculate);

    // Initial calculation on load
    calculate();
  </script>
</body>
</html>
