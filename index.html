<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jini Jewels Co</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col justify-center items-center min-h-[100dvh] font-sans text-gray-900 p-4">

    <div class="w-full max-w-sm md:max-w-md text-center mb-10">
        <h1 class="text-4xl md:text-5xl font-black text-[#064e3b] tracking-tight mb-2 md:mb-4">Jini Jewels Co</h1>
        <p class="text-sm md:text-base font-bold text-gray-500 tracking-wide uppercase">Showroom System</p>
    </div>

    <div class="w-full max-w-sm md:max-w-md flex flex-col gap-4 md:gap-6">
        <button id="installAppBtn" class="hidden bg-blue-600 border-2 border-blue-700 rounded-2xl p-4 md:p-6 shadow-md flex items-center justify-center text-center text-white hover:bg-blue-700 transition-all active:scale-95">
            <span class="font-bold text-sm md:text-lg uppercase tracking-widest">📲 Install App to Home Screen</span>
        </button>

        <a href="retail.html" class="bg-white border-2 border-[#047857] rounded-2xl p-5 md:p-8 shadow-md flex items-center justify-center text-center hover:bg-emerald-50 transition-all active:scale-95">
            <span class="font-bold text-[#064e3b] text-base md:text-xl uppercase tracking-widest">Retail Calculator</span>
        </a>
        
        <a href="backoffice.html" class="bg-white border border-gray-200 rounded-2xl p-5 md:p-8 shadow-sm flex items-center justify-center text-center hover:border-[#047857] transition-all active:scale-95">
            <span class="font-bold text-[#064e3b] text-base md:text-xl uppercase tracking-widest">Back Office Calculator</span>
        </a>
    </div>

    <script>
        let deferredPrompt;
        const installBtn = document.getElementById('installAppBtn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
        });
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.classList.add('hidden');
                deferredPrompt = null;
            }
        });
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').then(r => r.update()));
        }
    </script>
</body>
</html>
