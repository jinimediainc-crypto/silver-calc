<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silver Pricing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom checkbox color to match the theme */
        input[type="checkbox"] {
            accent-color: #23b586;
            width: 1.1rem;
            height: 1.1rem;
            cursor: pointer;
        }
        /* Hide number input arrows for a cleaner look */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="bg-[#f4f6f8] flex justify-center items-start min-h-screen pt-10 px-4 font-sans text-gray-800">

    <div class="bg-white rounded-[20px] shadow-sm border border-gray-100 p-6 w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center text-[#23b586] mb-6">Silver Pricing</h1>

        <div class="mb-4">
            <label class="block text-sm font-bold text-gray-700 mb-1">Silver Rate (₹ per Gram)</label>
            <input type="number" id="silverRate" class="w-full border border-gray-200 rounded-lg p-2.5 outline-none focus:border-[#23b586] transition-colors" placeholder="e.g., 90" />
            <p class="text-[11px] text-gray-400 mt-1">Saved automatically.</p>
        </div>

        <div class="mb-4">
            <label class="block text-sm font-bold text-gray-700 mb-1">Weight (Grams)</label>
            <input type="number" id="weight" class="w-full border border-gray-200 rounded-lg p-2.5 outline-none focus:border-[#23b586] transition-colors" placeholder="Enter total weight" />
        </div>

        <div class="mb-6">
            <label class="block text-sm font-bold text-gray-700 mb-1">Labour Charge (₹ per Gram)</label>
            <input type="number" id="labourCharge" class="w-full border border-gray-200 rounded-lg p-2.5 outline-none focus:border-[#23b586] transition-colors" placeholder="e.g., 25" />
        </div>

        <div class="mb-6 space-y-3 border-t border-gray-100 pt-4">
            <div class="flex items-center justify-between">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" id="gstToggle">
                    <span class="text-sm text-gray-600">Apply GST (3%)</span>
                </label>
            </div>
            
            <div class="flex items-center justify-between">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" id="commToggle">
                    <span class="text-sm text-gray-600">Apply Commission</span>
                </label>
                <div class="flex items-center space-x-1">
                    <input type="number" id="commRate" class="w-12 border border-gray-200 rounded p-1 text-center text-sm outline-none focus:border-[#23b586]" placeholder="10" />
                    <span class="text-sm text-gray-600">%</span>
                </div>
            </div>
        </div>

        <div class="border-t border-gray-100 pt-4 space-y-2 text-[13px] text-gray-500">
            <div class="flex justify-between">
                <span>Silver Value</span>
                <span id="valSilver">₹ 0.00</span>
            </div>
            <div class="flex justify-between">
                <span>Labour Value</span>
                <span id="valLabour">₹ 0.00</span>
            </div>
            <div class="flex justify-between">
                <span>GST (3%)</span>
                <span id="valGst">₹ 0.00</span>
            </div>
            <div class="flex justify-between">
                <span id="labelComm">Commission (10%)</span>
                <span id="valComm">₹ 0.00</span>
            </div>
        </div>

        <div class="border-t border-gray-100 mt-4 pt-4 flex justify-between items-center">
            <span class="text-xl font-bold text-[#23b586]">Total</span>
            <span id="valTotal" class="text-xl font-bold text-[#23b586]">₹ 0.00</span>
        </div>
    </div>

    <script>
        // DOM Elements
        const inputs = {
            silverRate: document.getElementById('silverRate'),
            weight: document.getElementById('weight'),
            labourCharge: document.getElementById('labourCharge'),
            gstToggle: document.getElementById('gstToggle'),
            commToggle: document.getElementById('commToggle'),
            commRate: document.getElementById('commRate')
        };

        const outputs = {
            silver: document.getElementById('valSilver'),
            labour: document.getElementById('valLabour'),
            gst: document.getElementById('valGst'),
            comm: document.getElementById('valComm'),
            total: document.getElementById('valTotal'),
            commLabel: document.getElementById('labelComm')
        };

        // Format number to Indian Rupee format
        const formatINR = (num) => {
            return '₹ ' + num.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        };

        // Load cached data from localStorage
        const loadCache = () => {
            inputs.silverRate.value = localStorage.getItem('calc_silverRate') || '';
            inputs.weight.value = localStorage.getItem('calc_weight') || '';
            inputs.labourCharge.value = localStorage.getItem('calc_labourCharge') || '';
            inputs.commRate.value = localStorage.getItem('calc_commRate') || '10'; // Default to 10%
            
            // Toggles (Default to true if not set before)
            const savedGst = localStorage.getItem('calc_gstToggle');
            inputs.gstToggle.checked = savedGst !== null ? savedGst === 'true' : true;
            
            const savedComm = localStorage.getItem('calc_commToggle');
            inputs.commToggle.checked = savedComm !== null ? savedComm === 'true' : true;
        };

        // Save current data to localStorage
        const saveCache = () => {
            localStorage.setItem('calc_silverRate', inputs.silverRate.value);
            localStorage.setItem('calc_weight', inputs.weight.value);
            localStorage.setItem('calc_labourCharge', inputs.labourCharge.value);
            localStorage.setItem('calc_gstToggle', inputs.gstToggle.checked);
            localStorage.setItem('calc_commToggle', inputs.commToggle.checked);
            localStorage.setItem('calc_commRate', inputs.commRate.value);
        };

        // Core Calculation Logic
        const calculate = () => {
            const rate = parseFloat(inputs.silverRate.value) || 0;
            const weight = parseFloat(inputs.weight.value) || 0;
            const labour = parseFloat(inputs.labourCharge.value) || 0;
            const commRateValue = parseFloat(inputs.commRate.value) || 0;
            
            const isGstOn = inputs.gstToggle.checked;
            const isCommOn = inputs.commToggle.checked;

            // Base Values
            const silverValue = rate * weight;
            const labourValue = labour * weight;
            const subTotal = silverValue + labourValue;

            // Optional Values
            const gstValue = isGstOn ? (subTotal * 0.03) : 0;
            const commValue = isCommOn ? (subTotal * (commRateValue / 100)) : 0;
            
            // Total
            const totalValue = subTotal + gstValue + commValue;

            // Update UI
            outputs.silver.innerText = formatINR(silverValue);
            outputs.labour.innerText = formatINR(labourValue);
            outputs.gst.innerText = formatINR(gstValue);
            outputs.comm.innerText = formatINR(commValue);
            outputs.total.innerText = formatINR(totalValue);
            
            // Update Commission Label dynamically based on input
            outputs.commLabel.innerText = `Commission (${commRateValue}%)`;

            // Dim text if disabled for better UX
            outputs.gst.style.opacity = isGstOn ? '1' : '0.3';
            outputs.comm.style.opacity = isCommOn ? '1' : '0.3';
            outputs.commLabel.style.opacity = isCommOn ? '1' : '0.3';

            saveCache();
        };

        // Attach Event Listeners to trigger calculation on any change
        Object.values(inputs).forEach(input => {
            input.addEventListener('input', calculate);
            input.addEventListener('change', calculate);
        });

        // Initialize App
        loadCache();
        calculate();
    </script>
</body>
</html>
